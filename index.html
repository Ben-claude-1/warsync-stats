<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WarSync Stats · AR1S</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1d2e;min-height:100vh;padding-bottom:72px}
button{font-family:inherit;cursor:pointer;transition:all .15s;border:none;background:none}
table{border-collapse:collapse;width:100%}
input,textarea,select{font-family:inherit;outline:none}
:root{
  --bg:#f5f6fa;--card:#fff;--primary:#2c3e6b;--pri-l:#eef1f8;--acc:#e8a020;--acc-l:#fef6e6;
  --win:#27ae60;--win-l:#eafaf1;--loss:#c0392b;--loss-l:#fdedec;
  --tx:#1a1d2e;--tx2:#5a6278;--tx3:#8892a4;--bd:#e2e6f0;--bd2:#c8cfe0;
  --oil:#c0392b;--oil-l:#fff0f0;--med:#2980b9;--med-l:#eaf4fb;--silo:#e8a020;--ass:#7c3aed;--ass-l:#f5f0ff;
}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

.hd{background:var(--primary);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(44,62,107,.18)}
.hd-title{font-size:17px;font-weight:800}.hd-sub{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.06em}
.hd-r{display:flex;align-items:center;gap:8px}
.role-pill{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--win);flex-shrink:0}
.sync-dot.err{background:var(--loss)}.sync-dot.wait{background:var(--acc);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);display:flex;z-index:100;box-shadow:0 -2px 14px rgba(0,0,0,.07)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 7px;font-size:10px;color:var(--tx3);font-weight:500;gap:3px;cursor:pointer;border:none;background:none;font-family:inherit}
.bni.on{color:var(--primary)}.bni svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}
.main{max-width:600px;margin:0 auto;padding:14px 14px 8px}

/* LOGIN */
.login-wrap{min-height:100vh;padding-bottom:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--primary)}
.login-card{background:#fff;border-radius:22px;padding:30px 22px;width:100%;max-width:360px;box-shadow:0 8px 48px rgba(0,0,0,.22)}
.login-icon{width:62px;height:62px;background:var(--primary);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-icon svg{width:34px;height:34px;stroke:#fff;stroke-width:1.8;fill:none}
.login-title{font-size:22px;font-weight:800;color:var(--primary);text-align:center}
.login-sub{font-size:13px;color:var(--tx3);text-align:center;margin:4px 0 22px}
.fl label{font-size:11px;font-weight:700;color:var(--tx2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fl{margin-bottom:14px}
.inp{width:100%;padding:12px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;color:var(--tx);background:#fff;transition:border-color .15s}
.inp:focus{border-color:var(--primary)}
.btn-pri{width:100%;padding:14px;background:var(--primary);color:#fff;border-radius:10px;font-size:15px;font-weight:700;margin-top:6px;cursor:pointer;border:none}
.demo-sep{margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);text-align:center;font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.demo-btn{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:10px;text-align:left;cursor:pointer;background:#fff;margin-bottom:7px;font-family:inherit}
.demo-btn:hover,.demo-btn:active{border-color:var(--primary);background:var(--pri-l)}
.demo-btn-name{font-size:13px;font-weight:700;color:var(--tx)}.demo-btn-desc{font-size:11px;color:var(--tx3);margin-top:2px}

.card{background:var(--card);border-radius:14px;border:1px solid var(--bd);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ch{padding:12px 15px;border-bottom:1px solid var(--bd);font-weight:700;font-size:14px;color:var(--tx);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ch-sub{font-size:11px;color:var(--tx3);font-weight:400}
.cb{padding:14px}

.stabs{display:flex;gap:3px;margin-bottom:14px;background:var(--pri-l);border-radius:10px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stab{padding:7px 12px;font-size:13px;border-radius:7px;font-weight:600;color:var(--tx2);white-space:nowrap;border:none;background:none;cursor:pointer;font-family:inherit;flex-shrink:0}
.stab.on{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}

.ttabs{display:flex;gap:8px;margin-bottom:14px}
.ttab{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:2px solid var(--bd);background:var(--card);color:var(--tx3);cursor:pointer;text-align:center;font-family:inherit}
.ttab.on-a{border-color:var(--win);color:var(--win);background:var(--win-l)}
.ttab.on-b{border-color:#2980b9;color:#2980b9;background:#eaf3fb}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sb{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px}
.sb-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;font-weight:600}
.sb-v{font-size:22px;font-weight:800;color:var(--tx)}.sb-s{font-size:11px;color:var(--tx3);margin-top:2px}

.rbanner{border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid}
.rbanner.win{background:var(--win-l);border-color:#a9dfbf}.rbanner.loss{background:var(--loss-l);border-color:#f5b7b1}.rbanner.pend{background:var(--acc-l);border-color:#f9e0a8}
.rb-date{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.rb-res{font-size:26px;font-weight:800}.rb-res.win{color:var(--win)}.rb-res.loss{color:var(--loss)}.rb-res.pend{color:var(--acc)}
.score-row{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.sc-block{text-align:center}.sc-name{font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px}.sc-pts{font-size:20px;font-weight:800}.sc-vs{font-size:12px;color:var(--tx3);font-weight:700}

.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
th{font-size:11px;color:var(--tx3);font-weight:600;padding:9px 11px;text-align:left;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.05em;background:#f8f9fc;white-space:nowrap}
td{font-size:13px;padding:9px 11px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--tx)}
tr:last-child td{border-bottom:none}

.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;white-space:nowrap}
.bar-w{display:flex;align-items:center;gap:6px}.bar-bg{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;min-width:40px}.bar-f{height:100%;border-radius:3px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}.dot-row{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.wh{display:flex;gap:5px;flex-wrap:wrap}.wh-d{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}

/* ZONE CARDS */
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.zc{border-radius:12px;padding:12px;border:2px solid transparent;transition:all .2s;position:relative}
.zc.oil{background:var(--oil-l);border-color:#c0392b33}.zc.med{background:var(--med-l);border-color:#2980b933}
.zc.silo{background:var(--acc-l);border-color:#e8a02044;grid-column:1/-1}.zc.ass{background:var(--ass-l);border-color:#7c3aed33}
.zc.drop-target{border-color:var(--primary);border-style:dashed;transform:scale(1.01)}
.zc-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.zc-name{font-size:12px;font-weight:800}.zc-pts{font-size:10px;color:var(--tx3);margin-top:1px}
.zc-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}

/* PLAYER CHIPS */
.player-chip{background:#fff;border-radius:8px;padding:7px 10px;margin-bottom:4px;font-size:12px;font-weight:600;border:1.5px solid rgba(0,0,0,.09);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:all .15s;touch-action:none;user-select:none}
.player-chip:hover{border-color:var(--primary);background:var(--pri-l)}
.player-chip.selected{border-color:var(--primary);background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(44,62,107,.25)}
.player-chip.dragging{opacity:.4}
.chip-t1{font-size:10px;opacity:.6;white-space:nowrap}
.zc-empty{font-size:11px;color:var(--tx3);font-style:italic;padding:6px 0;text-align:center;border:1.5px dashed var(--bd2);border-radius:6px;margin-bottom:4px}

/* WEIGHT INPUTS */
.weight-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.weight-label{font-size:12px;font-weight:600;flex:1;min-width:0}
.weight-inp{width:54px;padding:5px 8px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-weight:700;text-align:center;color:var(--tx)}
.weight-inp:focus{border-color:var(--primary)}
.weight-bar{flex:2;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;min-width:40px}
.weight-bar-f{height:100%;border-radius:3px;transition:width .3s}
.weight-pct{font-size:11px;color:var(--tx3);min-width:30px;text-align:right}

/* SLOT INPUT */
.slot-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.slot-label{font-size:12px;color:var(--tx2);flex:1}
.slot-btns{display:flex;align-items:center;gap:4px}
.slot-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--bd);background:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;color:var(--primary)}
.slot-num{font-size:15px;font-weight:800;min-width:20px;text-align:center;color:var(--tx)}

.note{background:var(--acc-l);border:1px solid #f9e0a8;border-left:3px solid var(--acc);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--tx2);margin-bottom:12px}
.note.info{background:var(--pri-l);border-color:#c5d0e8;border-left-color:var(--primary);color:var(--primary)}
.note.ok{background:var(--win-l);border-color:#a9dfbf;border-left-color:var(--win);color:#1a6b3a}

.loader{text-align:center;padding:48px;color:var(--tx3);font-size:14px}
.spin{display:inline-block;width:22px;height:22px;border:2px solid var(--bd2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn-out{background:#fff;border:1.5px solid var(--bd);color:var(--tx2)}
.btn-sol{background:var(--primary);color:#fff}.btn-sol:active{opacity:.9}
.btn-ok{background:var(--win-l);color:var(--win);border:1.5px solid #a9dfbf}
.btn-no{background:var(--loss-l);color:var(--loss);border:1.5px solid #f5b7b1}
.btn-acc{background:var(--acc-l);color:var(--acc);border:1.5px solid #f9e0a8}

.fi{width:100%;padding:11px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;color:var(--tx);background:#fff;transition:border-color .15s}
.fi:focus{border-color:var(--primary)}
.fl2{margin-bottom:12px}.fl2 label{font-size:11px;color:var(--tx3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}

.upl{border:2px dashed var(--bd2);border-radius:12px;padding:22px;text-align:center;cursor:pointer;background:#fff;margin-bottom:12px}
.upl:hover,.upl:active{border-color:var(--primary);background:var(--pri-l)}
.upl svg{width:30px;height:30px;stroke:var(--tx3);stroke-width:1.5;margin-bottom:8px;fill:none}
.upl-t{font-size:14px;font-weight:700;color:var(--tx2)}.upl-s{font-size:12px;color:var(--tx3);margin-top:3px}

.kk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kk-box{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px}
.kk-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;font-weight:600}.kk-v{font-size:16px;font-weight:800;color:var(--tx)}

.mi{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--bd)}
.mi:last-child{border-bottom:none}
.mav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:var(--pri-l);color:var(--primary)}
.mn{font-size:14px;font-weight:700}.mm{font-size:11px;color:var(--tx3);margin-top:2px}
.mr{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}

.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.qc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:15px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.qc:active{transform:scale(.97)}
.qc-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.qc-ico svg{width:21px;height:21px;stroke-width:2;fill:none;stroke:currentColor}
.qc-t{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px}.qc-s{font-size:11px;color:var(--tx3)}

.cs{text-align:center;padding:60px 24px}.cs-ico{font-size:48px;margin-bottom:16px}
.cs-t{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:8px}.cs-s{font-size:14px;color:var(--tx3)}

/* MOVE HINT */
.move-hint{text-align:center;padding:10px;font-size:12px;color:var(--primary);font-weight:700;background:var(--pri-l);border-radius:8px;margin-bottom:8px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SB='https://ktdzxhyuvukontcxghte.supabase.co';
const KEY='sb_publishable_e88gpqka1Iom849Ope2mFw_i8tSWCS8';

const DEMO_USERS=[
  {username:'ben_the_men',playerName:'BenTheMen',role:'superadmin',wsResp:true,label:'Ben · Super-Admin',desc:'Alle Rechte, alle Allianzen'},
  {username:'r5_phoenix',playerName:'GeneralBlücher',role:'r5',wsResp:true,label:'R5 · Präsident',desc:'Alle Stats, R4 zuweisen, Seasons'},
  {username:'r4_ws',playerName:'xArticulate',role:'r4',wsResp:true,label:'R4 · Wüstensturm',desc:'WS-Planung, Aufstellung, Stärken'},
  {username:'spieler_demo',playerName:'Dani3371',role:'r1',wsResp:false,label:'Spieler (R1–R3)',desc:'Eigene Stats & Teilnahme'},
];
const ROLES={superadmin:'Super-Admin',r5:'R5',r4:'R4',r3:'R3',r2:'R2',r1:'R1'};
const ROLE_C={superadmin:'#7c3aed',r5:'#c0392b',r4:'#e8a020',r3:'#27ae60',r2:'#2980b9',r1:'#8892a4'};

// Spieler die die Allianz verlassen haben (aus Screenshots ermittelt)
const INACTIVE_PLAYERS=new Set(['ChrisPiii','Dani3371','Goramar','Hurikan666','Kogse','Lulllull',
  'MaidenofShadows','saltycereal','Sol Aeternus','StylesX','Vikotnik','xArticulate','xcape']);
function isInactive(n){return INACTIVE_PLAYERS.has(n);}

const APP={
  user:null,page:'home',wsView:'anmeldung',team:'A',
  data:{events:[],participation:[],players:[]},
  synced:false,syncErr:false,
  // Aufstellung state
  lineup:{ass:[],z1:[],z2:[],z3:[],z4:[]},
  zoneSlots:{ass:2,z1:3,z2:2,z3:3,z4:3},
  zoneWeights:{z1:30,z2:15,z3:30,z4:15},
  accepted:[],
  teamAssign:{}, // playerName → 'A' | 'B' | null
  anmeldungClosed:false,
  // Drag state
  selectedChip:null, selectedFromZone:null,
  lineupReady:false,
  // Event drill-down & player profile
  wsEventId:null,
  selectedPlayer:null,
  excusedPlayers:[],
  // Spieler-Sortierung
  playerSort:'name',
  // Allianz
  allianzSort:'role',
  allianzFilter:{roles:[],profession:''},
  allianzPlayer:null,
};

// ====== SUPABASE ======
async function sbGet(p){const r=await fetch(SB+'/rest/v1/'+p,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,d){const r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r;}
async function sbPatch(t,q,d){const r=await fetch(SB+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r;}

async function loadData(){
  setSyncDot('wait');
  try{
    const[ev,pa,pl]=await Promise.all([sbGet('ws_events?order=event_date.desc,team.asc'),sbGet('ws_participation?order=rank.asc'),sbGet('ws_players?order=t1.desc.nullslast')]);
    APP.data={events:ev,participation:pa,players:pl};
    APP.synced=true;APP.syncErr=false;setSyncDot('ok');
    // Init accepted from all players if empty
    if(!APP.accepted.length)APP.accepted=pl.map(p=>p.name);
    renderPage();
  }catch(err){APP.syncErr=true;setSyncDot('err');console.error(err);renderPage();}
}
function setSyncDot(s){const d=document.getElementById('sd');if(d)d.className='sync-dot'+(s==='err'?' err':s==='wait'?' wait':'');}

// ====== HELPERS ======
function fmt(n){return n?Number(n).toLocaleString('de-DE'):'–';}
function badge(t,c){return`<span class="badge" style="background:${c}22;color:${c}">${t}</span>`;}
function roleBadge(r){return badge(ROLES[r]||r,ROLE_C[r]||'#8892a4');}
function canAccess(f){const u=APP.user;if(!u)return false;if(u.role==='superadmin')return true;if(f==='ws')return u.role==='r5'||(u.role==='r4'&&u.wsResp);if(f==='allianz')return u.role==='r5'||u.role==='r4';if(f==='admin')return u.role==='superadmin';return true;}
function reliability(name){const p=APP.data.participation.filter(x=>{const ev=APP.data.events.find(e=>e.id===x.event_id);return ev&&x.player_name===name;});if(!p.length)return null;return Math.round(p.filter(x=>x.played).length/p.length*100);}
function relColor(pct){if(pct===null)return'var(--tx3)';if(pct>=80)return'var(--win)';if(pct>=50)return'var(--acc)';return'var(--loss)';}
function avgPts(name){const p=APP.data.participation.filter(x=>x.player_name===name&&x.played&&x.individual_pts);if(!p.length)return 0;return Math.round(p.reduce((s,x)=>s+(x.individual_pts||0),0)/p.length);}
function getT1(name){return parseFloat(APP.data.players.find(p=>p.name===name)?.t1)||0;}
function fmtK(n){if(!n)return'–';if(n>=1000000)return(n/1000000).toLocaleString('de-DE',{maximumFractionDigits:1})+'M';if(n>=1000)return Math.round(n/1000)+'K';return String(n);}
function roleRank(r){return{R5:5,R4:4,R3:3,R2:2,R1:1}[r]||2;}
function rankBadge(r){const c={R5:'#f39c12',R4:'#9b59b6',R3:'#7f8c8d',R2:'#95a5a6',R1:'#bdc3c7'}[r||'R3']||'#7f8c8d';return`<span style="font-size:10px;font-weight:800;color:${c};background:${c}22;padding:2px 6px;border-radius:4px;flex-shrink:0">${r||'R3'}</span>`;}
function sortPlayers(list){
  const s=APP.playerSort;
  return[...list].sort((a,b)=>{
    const ai=isInactive(a.name),bi=isInactive(b.name);
    if(ai!==bi)return ai?1:-1; // inactive always last
    // Primary: role rank descending
    const rra=roleRank(a.role),rrb=roleRank(b.role);
    if(rra!==rrb)return rrb-rra;
    // Secondary: selected sort
    if(s==='t1')return(parseFloat(b.t1)||0)-(parseFloat(a.t1)||0);
    if(s==='kills')return(b.kills||0)-(a.kills||0);
    if(s==='popularity')return(b.popularity||0)-(a.popularity||0);
    if(s==='profession_level')return(b.profession_level||0)-(a.profession_level||0);
    if(s==='reliability'){const ra=reliability(a.name)??-1,rb=reliability(b.name)??-1;return rb-ra;}
    return a.name.localeCompare(b.name);
  });
}

async function ensureWeeklyEvents(){
  const monday=getMondayOfWeek();
  const exists=APP.data.events.some(e=>e.event_date===monday);
  if(!exists){
    await sbPost('ws_events',[{event_date:monday,team:'A',time_slot:'13:00 Uhr',result:'pending'},{event_date:monday,team:'B',time_slot:'22:30 Uhr',result:'pending'}]);
    const ev=await sbGet('ws_events?order=event_date.desc,team.asc');
    APP.data.events=ev;renderPage();
  }
}

function wsErgebnis(){
  if(APP.wsEventId)return wsErgebnisDrilldown(APP.wsEventId);
  const allEvts=APP.data.events.sort((a,b)=>b.event_date.localeCompare(a.event_date));
  if(!allEvts.length)return`<div class="loader">Noch keine Events vorhanden.</div>`;
  // Stats across all done events
  const done=allEvts.filter(e=>e.result&&e.result!=='pending');
  const wins=done.filter(e=>e.result==='win').length;
  const rate=done.length?Math.round(wins/done.length*100):0;
  let h=`<div class="sg"><div class="sb"><div class="sb-l">Siege</div><div class="sb-v" style="color:var(--win)">${wins}</div></div><div class="sb"><div class="sb-l">Niederlagen</div><div class="sb-v" style="color:var(--loss)">${done.length-wins}</div></div><div class="sb"><div class="sb-l">Siegquote</div><div class="sb-v" style="color:var(--win)">${rate}%</div></div><div class="sb"><div class="sb-l">Events</div><div class="sb-v">${done.length}</div></div></div>`;
  // Group by date
  const dates=[...new Set(allEvts.map(e=>e.event_date))];
  h+=`<div class="card"><div class="ch">Alle Events <span class="ch-sub">Tippen für Details</span></div>`;
  dates.forEach(date=>{
    const dayEvts=allEvts.filter(e=>e.event_date===date);
    const hasPending=dayEvts.some(e=>!e.result||e.result==='pending');
    h+=`<div style="padding:8px 14px 4px;font-size:12px;font-weight:800;color:var(--tx3);background:var(--bg2);border-bottom:1px solid var(--bd);letter-spacing:.3px">${date}${hasPending?' <span style="font-size:10px;color:var(--acc);font-weight:700">● Diese Woche</span>':''}</div>`;
    ['A','B'].forEach(team=>{
      const e=dayEvts.find(ev=>ev.team===team);
      if(!e)return;
      const isP=!e.result||e.result==='pending';
      const isW=e.result==='win';
      const c=isP?'var(--acc)':isW?'var(--win)':'var(--loss)';
      const label=isP?'Ausstehend':isW?'Sieg':'Niederlage';
      const ps=APP.data.participation.filter(p=>p.event_id===e.id);
      const played=ps.filter(p=>p.played).length;
      const diff=e.our_pts&&e.opp_pts?(e.our_pts>e.opp_pts?'+':'')+fmt(e.our_pts-e.opp_pts):'';
      h+=`<div class="mi" style="cursor:pointer;padding-left:22px" onclick="APP.wsEventId='${e.id}';renderPage()">
        <div style="width:36px;height:36px;border-radius:9px;background:${c}22;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${c};flex-shrink:0">${isP?'?':isW?'S':'N'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">Team ${team}${e.time_slot?' · '+e.time_slot:''}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:2px">${e.opponent||'Gegner unbekannt'}${diff?' · Diff: '+diff:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          ${badge(label,c)}
          ${ps.length?`<span style="font-size:10px;color:var(--tx3)">${played}/${ps.length}</span>`:''}
        </div>
      </div>`;
    });
  });
  h+=`</div>`;
  return h;
}

function wsErgebnisDrilldown(eventId){
  const ev=APP.data.events.find(e=>e.id===eventId);
  if(!ev)return`<div class="loader">Event nicht gefunden.</div>`;
  const ps=APP.data.participation.filter(p=>p.event_id===ev.id);
  const played=ps.filter(p=>p.played),missed=ps.filter(p=>!p.played);
  const excused=missed.filter(p=>p.excused),absent=missed.filter(p=>!p.excused);
  const tot=played.reduce((s,p)=>s+(p.individual_pts||0),0);
  const mx=Math.max(...played.map(p=>p.individual_pts||0),1);
  const isW=ev.result==='win',isP=!ev.result||ev.result==='pending';
  const bc=isP?'pend':isW?'win':'loss';
  const rt=isP?'Ausstehend':isW?'SIEG':'NIEDERLAGE';
  let h=`<button class="btn btn-out btn-sm" onclick="APP.wsEventId=null;renderPage()" style="margin-bottom:12px">← Alle Events</button>`;
  h+=`<div class="rbanner ${bc}">
    <div class="rb-date">${ev.event_date}${ev.time_slot?' · '+ev.time_slot:''}</div>
    <div class="rb-res ${bc}">${rt}</div>
    <div class="score-row">
      <div class="sc-block"><div class="sc-name">AR1S</div><div class="sc-pts" style="color:${isP?'var(--acc)':isW?'var(--win)':'var(--loss)'}">${fmt(ev.our_pts)}</div></div>
      <div class="sc-vs">VS</div>
      <div class="sc-block"><div class="sc-name">${ev.opponent||'Gegner'}</div><div class="sc-pts" style="color:var(--tx3)">${fmt(ev.opp_pts)}</div></div>
      ${ev.our_pts&&ev.opp_pts?`<div class="sc-block"><div class="sc-name">Differenz</div><div class="sc-pts" style="color:${ev.our_pts>ev.opp_pts?'var(--win)':'var(--loss)'}">${ev.our_pts>ev.opp_pts?'+':''}${fmt(ev.our_pts-ev.opp_pts)}</div></div>`:''}
    </div></div>`;
  h+=`<div class="sg"><div class="sb"><div class="sb-l">Gespielt</div><div class="sb-v" style="color:var(--win)">${played.length}</div></div><div class="sb"><div class="sb-l">Gefehlt</div><div class="sb-v" style="color:${absent.length?'var(--loss)':'var(--tx3)'}">${absent.length}</div></div><div class="sb"><div class="sb-l">Entschuldigt</div><div class="sb-v" style="color:var(--acc)">${excused.length}</div></div><div class="sb"><div class="sb-l">Quote</div><div class="sb-v" style="color:var(--win)">${ps.length?Math.round(played.length/ps.length*100):0}%</div></div></div>`;
  if(ps.length){
    const rows=[...played].sort((a,b)=>(a.rank||99)-(b.rank||99)).map(p=>{
      const pct=Math.round((p.individual_pts||0)/mx*100);
      const share=tot?((p.individual_pts||0)/tot*100).toFixed(1):'0';
      const rc=p.rank===1?'#f1c40f':p.rank===2?'#aaa':p.rank===3?'#cd7f32':'var(--tx3)';
      const zc=p.zone?.includes('Assassin')?'var(--ass)':p.zone?.includes('1')||p.zone?.includes('3')?'var(--oil)':'var(--med)';
      const inact=isInactive(p.player_name);
      return`<tr style="${inact?'opacity:.45;background:#fafafa':''}"><td style="font-weight:800;color:${rc}">${p.rank||'–'}</td><td><strong>${p.player_name}</strong>${inact?` <span style="font-size:9px;color:#e67e22;font-weight:700">AUSGETRETEN</span>`:''}</td><td>${p.zone?badge(p.zone,zc):'–'}</td><td style="font-weight:700">${fmt(p.individual_pts)}</td><td><div class="bar-w"><div class="bar-bg"><div class="bar-f" style="width:${pct}%;background:${p.rank<=3?'#f1c40f':'var(--primary)'}"></div></div><span style="font-size:10px;color:var(--tx3)">${share}%</span></div></td></tr>`;}).join('');
    const missedRows=missed.map(p=>{const inact=isInactive(p.player_name);return`<tr style="opacity:.55;${inact?'background:#fafafa':''}"><td>–</td><td>${p.player_name}${inact?` <span style="font-size:9px;color:#e67e22;font-weight:700">AUSGETRETEN</span>`:''}</td><td>${p.zone?badge(p.zone,'var(--tx3)'):'–'}</td><td>–</td><td>${badge(p.excused?'Entschuldigt':'Gefehlt',p.excused?'var(--acc)':'var(--loss)')}</td></tr>`;}).join('');
    h+=`<div class="card"><div class="ch">Individuelle Punkte</div><div class="scroll-x"><table><thead><tr><th>#</th><th>Spieler</th><th>Zone</th><th>Punkte</th><th>Anteil</th></tr></thead><tbody>${rows}${missedRows}</tbody></table></div></div>`;
  }else{h+=`<div class="note">Noch keine Teilnahme-Daten für dieses Event.</div>`;}
  return h;
}

// --- AUFSTELLUNG (Drag & Drop + Gewichtung) ---
function wsAufstellung(){
  const ZONE_DEF={
    ass:{label:'⚔ Assassinen',sub:'Nullen Gegner vor 10:32',pts:'Angriff ~10 Min',type:'ass',color:'var(--ass)'},
    z1:{label:'Zone 1',sub:'Ölraffinerie',pts:'+50/s — nie aufgeben!',type:'oil',color:'var(--oil)'},
    z2:{label:'Zone 2',sub:'Feldlazarett',pts:'+60/s → Z5 nach 10 Min',type:'med',color:'var(--med)'},
    z3:{label:'Zone 3',sub:'Ölraffinerie',pts:'+60/s — nie aufgeben!',type:'oil',color:'var(--oil)'},
    z4:{label:'Zone 4',sub:'Feldlazarett',pts:'+60/s → Z5 nach 10 Min',type:'med',color:'var(--med)'},

  function renderChip(name,zone){

  }

  function renderZone(zoneKey){
    const def=ZONE_DEF[zoneKey];

    return`<div class="zc ${def.type}${isTarget?' drop-target':''}" id="zone-${zoneKey}"
      onclick="dropToZone('${zoneKey}')"
      ondragover="event.preventDefault()"
      ondrop="handleDrop(event,'${zoneKey}')">
      <div class="zc-hd">
        <div><div class="zc-name" style="color:${def.color}">${def.label}</div><div class="zc-pts">${def.sub} · ${def.pts}</div></div>
        <div class="zc-count" style="background:${def.color}22;color:${def.color}">${players.length}/${slots}</div>
      </div>
      ${isEmpty?`<div class="zc-empty">Leer – Spieler antippen zum Zuweisen</div>`:''}
      ${players.map(n=>renderChip(n,zoneKey)).join('')}
    </div>`;
  }

  const totalW=Object.values(APP.zoneWeights).reduce((a,b)=>a+b,0)||1;
  const wColors={z1:'var(--oil)',z2:'var(--med)',z3:'var(--oil)',z4:'var(--med)'};

  return`
    ${sel?`<div class="move-hint">„${sel}" ausgewählt — Zone antippen zum Verschieben</div>`:''}

    <!-- ZONE MAP -->
    <div class="zone-grid">
      ${renderZone('ass')===renderZone('ass')?renderZone('ass'):''}
      ${renderZone('z1')}

// Drag & Drop handlers
function dragStart(e,name,fromZone){
  APP.selectedChip=name;APP.selectedFromZone=fromZone;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',name);
  renderPage();}
function dragEnd(e){e.target.classList.remove('dragging');}
function handleDrop(e,toZone){e.preventDefault();if(APP.selectedChip)moveChip(APP.selectedChip,APP.selectedFromZone,toZone);}

// Tap-to-select (mobile)
function selectChip(name,zone){
  if(APP.selectedChip===name){APP.selectedChip=null;APP.selectedFromZone=null;}
  else{APP.selectedChip=name;APP.selectedFromZone=zone;}
  renderPage();}
function dropToZone(zone){
  if(!APP.selectedChip)return;
  if(APP.selectedFromZone===zone){APP.selectedChip=null;APP.selectedFromZone=null;renderPage();return;}
  moveChip(APP.selectedChip,APP.selectedFromZone,zone);
}
function moveChip(name,fromZone,toZone){
  // Remove from source
  if(fromZone&&APP.lineup[fromZone])APP.lineup[fromZone]=APP.lineup[fromZone].filter(n=>n!==name);
  // Remove from any other zone (safety)
  Object.keys(APP.lineup).forEach(k=>{if(k!==toZone)APP.lineup[k]=APP.lineup[k].filter(n=>n!==name);});
  // Add to target
  if(!APP.lineup[toZone])APP.lineup[toZone]=[];
  if(!APP.lineup[toZone].includes(name))APP.lineup[toZone].push(name);
  APP.selectedChip=null;APP.selectedFromZone=null;APP.lineupReady=true;
  renderPage();}

function updateWeight(k,v){APP.zoneWeights[k]=Math.max(0,Math.min(100,parseInt(v)||0));renderPage();}
function changeSlot(k,d){APP.zoneSlots[k]=Math.max(k==='ass'?2:1,Math.min(10,(APP.zoneSlots[k]||0)+d));renderPage();}

function autoAssign(){
  // Use players assigned to current team via teamAssign, fallback to accepted
  const teamPool=Object.entries(APP.teamAssign).filter(([,v])=>v===APP.team).map(([k])=>k);
  const pool=(teamPool.length?teamPool:[...APP.accepted]).sort((a,b)=>getT1(b)-getT1(a));
  // Assassinen: top 2 strongest
  APP.lineup.ass=pool.slice(0,2);
  const rest=pool.slice(2);
  // Order zones by weight descending → best players go to most important zones
  const zoneOrder=Object.entries(APP.zoneWeights).sort(([,a],[,b])=>b-a).map(([k])=>k);
  APP.lineup={ass:APP.lineup.ass,z1:[],z2:[],z3:[],z4:[]};
  let idx=0;
  for(const z of zoneOrder){
    const slots=APP.zoneSlots[z];
    APP.lineup[z]=rest.slice(idx,idx+slots);
    idx+=slots;
  }
  APP.lineupReady=true;
  APP.selectedChip=null;
  renderPage();}
function resetLineup(){APP.lineup={ass:[],z1:[],z2:[],z3:[],z4:[]};APP.lineupReady=false;APP.selectedChip=null;renderPage();}

--- Aufstellung Wüstensturm – Team ${t} (${time} Uhr) ---
⚔ Assassinen: ${L.ass.join(', ')||'–'}
Zone 1 (Ölraffinerie): ${L.z1.join(', ')||'–'}

  // Spieler-Info (Beruf, Kills, Beliebtheit)

  if(allParts.length){
    h+=`<div class="sg"><div class="sb"><div class="sb-l">Gespielt</div><div class="sb-v" style="color:var(--win)">${played.length}</div><div class="sb-s">von ${allParts.length}</div></div><div class="sb"><div class="sb-l">Siege</div><div class="sb-v" style="color:var(--win)">${evtsWon}</div><div class="sb-s">als aktiver Spieler</div></div><div class="sb"><div class="sb-l">Niederlagen</div><div class="sb-v" style="color:var(--loss)">${evtsLost}</div></div><div class="sb"><div class="sb-l">Ø Punkte</div><div class="sb-v">${fmt(avgP)}</div><div class="sb-s">pro Event</div></div>${missed.length?`<div class="sb"><div class="sb-l">Gefehlt</div><div class="sb-v" style="color:var(--loss)">${missed.length}</div></div>`:''}${excused.length?`<div class="sb"><div class="sb-l">Entschuldigt</div><div class="sb-v" style="color:var(--acc)">${excused.length}</div></div>`:''}</div>`;
  }

  // Event history
  if(allEvts.length){
    h+=`<div class="card"><div class="ch">WS-Verlauf</div>`;
    allEvts.forEach(x=>{
      const ev=x.ev;
      const c=x.played?(ev.result==='win'?'var(--win)':'var(--loss)'):(x.excused?'var(--acc)':'var(--loss)');
      const label=x.played?(ev.result==='win'?'Sieg':'Niederlage'):(x.excused?'Entschuldigt':'Gefehlt');
      h+=`<div class="mi">
        <div style="width:34px;height:34px;border-radius:9px;background:${c}22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${c};flex-shrink:0">${x.played?(ev.result==='win'?'S':'N'):(x.excused?'E':'F')}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${ev.event_date} · Team ${ev.team}</div>
          <div style="font-size:11px;color:var(--tx3)">${ev.opponent||''}${x.zone?' · '+x.zone:''}${x.rank?' · Platz '+x.rank:''}</div>
        </div>
        <div class="mr">
          ${x.individual_pts?`<span style="font-size:13px;font-weight:800">${fmt(x.individual_pts)}</span>`:''}
          ${badge(label,c)}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="note">Noch keine WS-Teilnahme erfasst.</div>`;
  }
  return h;
}

        </div>

  </div></div>

let _resultChoice=null;
function setResult(r){
  _resultChoice=r;
  document.getElementById('res-win').style.background=r==='win'?'var(--win)':'';
  document.getElementById('res-win').style.color=r==='win'?'#fff':'';
  document.getElementById('res-loss').style.background=r==='loss'?'var(--loss)':'';
  document.getElementById('res-loss').style.color=r==='loss'?'#fff':'';}

function toggleMissed(safe){
  const btn=document.getElementById('excbtn-'+safe);
  const cb=document.getElementById('miss-'+safe);
  if(btn)btn.style.display=cb&&cb.checked?'':'none';
  if(!cb||!cb.checked){
    // unchecked → remove from excused
    if(!APP.excusedPlayers)APP.excusedPlayers=[];
    // find player name by safe id match and remove
    const lbl=document.getElementById('exc-'+safe);
    if(lbl)lbl.textContent='';
  }
}
function markExcused(name,safe){
  if(!APP.excusedPlayers)APP.excusedPlayers=[];
  if(APP.excusedPlayers.includes(name)){
    APP.excusedPlayers=APP.excusedPlayers.filter(n=>n!==name);
  }else{
    APP.excusedPlayers.push(name);
  }
  const on=APP.excusedPlayers.includes(name);
  const btn=document.getElementById('excbtn-'+safe);
  const lbl=document.getElementById('exc-'+safe);
  if(btn){btn.style.background=on?'var(--acc)':'';btn.style.color=on?'#fff':'';}
  if(lbl)lbl.textContent=on?'✓ entschuldigt':'';
}

async function saveResult(){
  const date=document.getElementById('ef-date')?.value;
  const opp=document.getElementById('ef-opp')?.value;
  const our=parseInt(document.getElementById('ef-our')?.value)||null;
  const oppPts=parseInt(document.getElementById('ef-opp-pts')?.value)||null;
  if(!date||!_resultChoice){alert('Bitte Datum und Ergebnis (Sieg/Niederlage) angeben.');return;}
  const btn=document.getElementById('saveRes');if(btn){btn.textContent='Speichern…';btn.disabled=true;}
  try{
    const evRes=await fetch(SB+'/rest/v1/ws_events',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({event_date:date,team:APP.team,time_slot:APP.team==='A'?'13:00':'22:00',opponent:opp||null,our_pts:our,opp_pts:oppPts,result:_resultChoice})});
    if(!evRes.ok)throw new Error(await evRes.text());
    const [newEv]=await evRes.json();
    const eid=newEv.id;
    // Save participation for all players: missed = checked, played = unchecked
    const missed=new Set();
    APP.data.players.forEach(p=>{
      const safe=p.name.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
      const cb=document.getElementById('miss-'+safe);
      if(cb&&cb.checked)missed.add(p.name);
    });
    const excused=new Set(APP.excusedPlayers||[]);
    const mkRec=(p,withExc)=>{const r={event_id:eid,player_name:p.name,played:!missed.has(p.name)};if(withExc)r.excused=!missed.has(p.name)?false:excused.has(p.name);return r;};
    // Try inserting first batch with excused; if column missing, retry all without
    let batches=[];
    for(let i=0;i<APP.data.players.length;i+=20)batches.push(APP.data.players.slice(i,i+20));
    let hasExcusedCol=true;
    try{await sbPost('ws_participation',batches[0].map(p=>mkRec(p,true)));}
    catch(e){
      if(e.message&&e.message.includes('excused')){hasExcusedCol=false;await sbPost('ws_participation',batches[0].map(p=>mkRec(p,false)));}
      else throw e;
    }
    for(let i=1;i<batches.length;i++)await sbPost('ws_participation',batches[i].map(p=>mkRec(p,hasExcusedCol)));
    if(!hasExcusedCol)console.warn('excused column missing – SQL: ALTER TABLE ws_participation ADD COLUMN excused boolean DEFAULT false;');
    alert('✅ Ergebnis + Teilnahme gespeichert!');
    _resultChoice=null;APP.excusedPlayers=[];
    await loadData();
    APP.wsEventId=eid;
    setWSView('ergebnis');
  }catch(err){alert('Fehler: '+err.message);if(btn){btn.textContent='Ergebnis speichern';btn.disabled=false;}}
}

const ROLE_DOT_C={R5:'#f39c12',R4:'#9b59b6',R3:'#7f8c8d'};
function roleDot(r,inact){
  const c=inact?'#bdc3c7':(ROLE_DOT_C[r]||'#7f8c8d');
  return`<div style="width:30px;height:30px;border-radius:50%;background:${c};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff">${inact?'✕':(r||'R3')}</div>`;
}
function allianzSortPlayers(list){
  const s=APP.allianzSort;
  const f=APP.allianzFilter;
  // Filter by roles
  let filtered=[...list];
  if(f.roles&&f.roles.length)filtered=filtered.filter(p=>{
    if(isInactive(p.name))return f.roles.includes('inaktiv');
    return f.roles.includes(p.role||'R3');
  });
  // Filter by profession
  if(f.profession==='Kriegsführer')filtered=filtered.filter(p=>p.profession==='Kriegsführer');
  if(f.profession==='Ingenieur')filtered=filtered.filter(p=>!p.profession||p.profession==='Ingenieur');
  // Sort
  filtered.sort((a,b)=>{
    const ai=isInactive(a.name),bi=isInactive(b.name);
    if(ai!==bi)return ai?1:-1;
    if(s==='role'){const rr=roleRank(b.role)-roleRank(a.role);return rr!==0?rr:a.name.localeCompare(b.name);}
    if(s==='t1')return(parseFloat(b.t1)||0)-(parseFloat(a.t1)||0);
    if(s==='kills')return(b.kills||0)-(a.kills||0);
    if(s==='popularity')return(b.popularity||0)-(a.popularity||0);
    if(s==='profession_level')return(b.profession_level||0)-(a.profession_level||0);
    if(s==='profession')return(a.profession||'').localeCompare(b.profession||'');
    return a.name.localeCompare(b.name);
  });
  return filtered;
}

      <div class="fl2"><label>Allianzname</label><input class="fi" id="aName" placeholder="z.B. AR1S"></div>

      <button class="btn btn-sol" style="width:100%" onclick="requestAllianz()">Anfrage stellen</button>
    </div></div>`:''}`;
}

      ${p.t2?`<div class="kk-box"><div class="kk-l">T2</div><div class="kk-v">${p.t2} M</div></div>`:''}
      ${p.t3?`<div class="kk-box"><div class="kk-l">T3</div><div class="kk-v">${p.t3} M</div></div>`:''}
      ${p.t4?`<div class="kk-box"><div class="kk-l">T4</div><div class="kk-v">${p.t4} M</div></div>`:''}
      ${p.total_power?`<div class="kk-box" style="grid-column:1/-1"><div class="kk-l">Gesamtkampfkraft</div><div class="kk-v" style="font-size:18px">${fmt(p.total_power)}</div></div>`:''}
    </div></div></div>`;
  }
  if(allParts.length){
    h+=`<div class="sg"><div class="sb"><div class="sb-l">Gespielt</div><div class="sb-v" style="color:var(--win)">${played.length}</div><div class="sb-s">von ${allParts.length}</div></div><div class="sb"><div class="sb-l">Siege</div><div class="sb-v" style="color:var(--win)">${evtsWon}</div></div><div class="sb"><div class="sb-l">Niederlagen</div><div class="sb-v" style="color:var(--loss)">${evtsLost}</div></div><div class="sb"><div class="sb-l">Ø Punkte</div><div class="sb-v">${fmt(avgP)}</div></div>${missed.length?`<div class="sb"><div class="sb-l">Gefehlt</div><div class="sb-v" style="color:var(--loss)">${missed.length}</div></div>`:''}${excused.length?`<div class="sb"><div class="sb-l">Entschuldigt</div><div class="sb-v" style="color:var(--acc)">${excused.length}</div></div>`:''}</div>`;
  }
  if(allEvts.length){
    h+=`<div class="card"><div class="ch">WS-Verlauf</div>`;
    allEvts.forEach(x=>{
      const ev=x.ev;
      const c=x.played?(ev.result==='win'?'var(--win)':'var(--loss)'):(x.excused?'var(--acc)':'var(--loss)');
      const label=x.played?(ev.result==='win'?'Sieg':'Niederlage'):(x.excused?'Entschuldigt':'Gefehlt');
      h+=`<div class="mi"><div style="width:34px;height:34px;border-radius:9px;background:${c}22;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:${c};flex-shrink:0">${x.played?(ev.result==='win'?'S':'N'):(x.excused?'E':'F')}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${ev.event_date} · Team ${ev.team}</div><div style="font-size:11px;color:var(--tx3)">${ev.opponent||''}${x.zone?' · '+x.zone:''}${x.rank?' · Platz '+x.rank:''}</div></div>
        <div class="mr">${x.individual_pts?`<span style="font-size:13px;font-weight:800">${fmt(x.individual_pts)}</span>`:''}${badge(label,c)}</div>
      </div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="note">Noch keine WS-Teilnahme erfasst.</div>`;
  }
  return h;
}
function requestAllianz(){const n=document.getElementById('aName')?.value;if(!n){alert('Bitte Allianzname eingeben.');return;}alert(`Anfrage für "${n}" würde gespeichert (alliances-Tabelle in V2).`);}

// ========== PROFIL ==========
function pageProfil(){
  const u=APP.user;const player=APP.data.players.find(p=>p.name===u.playerName);const rel=reliability(u.playerName);
  const myParts=APP.data.participation.filter(p=>p.player_name===u.playerName).slice(0,8);
  let h=`<div style="display:flex;align-items:center;gap:13px;margin-bottom:20px">
    <div style="width:54px;height:54px;border-radius:16px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;color:#fff;flex-shrink:0">${u.playerName?.charAt(0)||'?'}</div>
    <div><div style="font-size:18px;font-weight:800">${u.playerName}</div><div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap">${roleBadge(u.role)}${rel!==null?`<span style="font-size:11px;font-weight:700;color:${relColor(rel)};background:${relColor(rel)}22;padding:3px 8px;border-radius:6px">Teilnahme ${rel}%</span>`:''}</div></div>
    <button class="btn btn-sm btn-out" style="margin-left:auto;flex-shrink:0" onclick="logout()">Abmelden</button>
  </div>`;
  if(player&&(player.t1||player.t2||player.t3)){
    h+=`<div class="card" style="margin-bottom:12px"><div class="ch">Aktuelle Truppenstärke</div><div style="padding:12px"><div class="kk-grid">
      ${player.t1?`<div class="kk-box"><div class="kk-l">T1 – Erste Truppe</div><div class="kk-v">${player.t1} M</div></div>`:''}
      ${player.t2?`<div class="kk-box"><div class="kk-l">T2 – Zweite Truppe</div><div class="kk-v">${player.t2} M</div></div>`:''}
      ${player.t3?`<div class="kk-box"><div class="kk-l">T3 – Dritte Truppe</div><div class="kk-v">${player.t3} M</div></div>`:''}
      ${player.t4?`<div class="kk-box"><div class="kk-l">T4 – Vierte Truppe</div><div class="kk-v">${player.t4} M</div></div>`:''}
      ${player.total_power?`<div class="kk-box" style="grid-column:1/-1"><div class="kk-l">Gesamtkampfkraft</div><div class="kk-v" style="font-size:18px">${fmt(player.total_power)}</div></div>`:''}
    </div></div></div>`;}
  h+=`<div class="card" style="margin-bottom:12px"><div class="ch">Stärken aktualisieren</div><div class="cb">
    <div class="upl" onclick="document.getElementById('troopSS').click()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div class="upl-t">Screenshot „Verteidigung Aufstellen"</div><div class="upl-s">T1 / T2 / T3 / T4 werden erkannt · OCR in V2</div>
      <input type="file" id="troopSS" accept="image/*" style="display:none" onchange="handleTroopSS()">
    </div>
    <div class="upl" onclick="document.getElementById('kkSS').click()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <div class="upl-t">Screenshot „Details der Kampfkraft"</div><div class="upl-s">Helden-, Drohnen-, Gebäude-, Einheiten-, Technologie-KK</div>
      <input type="file" id="kkSS" accept="image/*" style="display:none" onchange="handleTroopSS()">
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Oder manuell:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${[['manT1','T1 (Mio.)',player?.t1||''],['manT2','T2 (Mio.)',player?.t2||''],['manT3','T3 (Mio.)',player?.t3||''],['manT4','T4 (Mio.)',player?.t4||'']].map(([id,label,val])=>`<div><label style="font-size:11px;color:var(--tx3);display:block;margin-bottom:4px">${label}</label><input class="fi" id="${id}" type="number" step="0.01" value="${val}"></div>`).join('')}
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Kampfkraft:</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      ${[['man_helden','Helden-KK'],['man_drohnen','Drohnen-KK'],['man_gebaeude','Gebäude-KK'],['man_einheiten','Einheiten-KK'],['man_technologie','Technologie-KK']].map(([id,label])=>`<div><label style="font-size:11px;color:var(--tx3);display:block;margin-bottom:4px">${label}</label><input class="fi" id="${id}" type="number" placeholder="0"></div>`).join('')}
    </div>
    <button class="btn btn-sol" id="saveBtn" style="width:100%" onclick="saveStrength()">Stärken speichern</button>
  </div></div>`;
  if(myParts.length)h+=`<div class="card"><div class="ch">Meine Teilnahme</div>${myParts.map(p=>{const ev=APP.data.events.find(e=>e.id===p.event_id);return`<div class="mi"><div class="dot" style="background:${p.played?'var(--win)':'var(--loss)'};width:12px;height:12px;flex-shrink:0"></div><div><div class="mn" style="font-size:13px">${ev?.event_date||'–'} · Team ${ev?.team||'–'}</div><div class="mm">${p.zone?p.zone+' · ':''}${fmt(p.individual_pts)} Pkt${p.rank?' · Platz '+p.rank:''}</div></div><div class="mr">${badge(p.played?'Gespielt':'Gefehlt',p.played?'var(--win)':'var(--loss)')}</div></div>`;}).join('')}</div>`;
  return h;
}
function handleTroopSS(){alert('Screenshot erkannt!\nOCR-Analyse kommt in V2. Werte bitte manuell eingeben.');}
async function saveStrength(){
  const t1=parseFloat(document.getElementById('manT1')?.value)||null;const t2=parseFloat(document.getElementById('manT2')?.value)||null;
  const t3=parseFloat(document.getElementById('manT3')?.value)||null;const t4=parseFloat(document.getElementById('manT4')?.value)||null;
  const helden=parseInt(document.getElementById('man_helden')?.value)||null;const drohnen=parseInt(document.getElementById('man_drohnen')?.value)||null;
  const gebaeude=parseInt(document.getElementById('man_gebaeude')?.value)||null;const einheiten=parseInt(document.getElementById('man_einheiten')?.value)||null;
  const technologie=parseInt(document.getElementById('man_technologie')?.value)||null;
  if(!t1&&!t2&&!t3){alert('Bitte mindestens T1 eingeben.');return;}
  const btn=document.getElementById('saveBtn');if(btn){btn.textContent='Speichern…';btn.disabled=true;}
  try{
    await sbPost('player_stats_history',{player_name:APP.user.playerName,t1,t2,t3,t4,helden_kk:helden,drohnen_kk:drohnen,gebaeude_kk:gebaeude,einheiten_kk:einheiten,technologie_kk:technologie,recorded_at:new Date().toISOString().split('T')[0],uploaded_by:APP.user.username});
    const player=APP.data.players.find(p=>p.name===APP.user.playerName);
    if(player)await sbPatch('ws_players','id=eq.'+player.id,{t1,t2,t3,t4});
    alert('✅ Stärken gespeichert!');await loadData();
  }catch(err){alert('Fehler: '+err.message+'\n(Tabelle player_stats_history noch anlegen!)');if(btn){btn.textContent='Stärken speichern';btn.disabled=false;}}
}

render();
