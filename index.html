<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#1a1d2e;min-height:100vh;padding-bottom:72px}
button{font-family:inherit;cursor:pointer;transition:all .15s;border:none;background:none}
table{border-collapse:collapse;width:100%}
input,textarea,select{font-family:inherit;outline:none}
:root{
  --bg:#f5f6fa;--card:#fff;--primary:#2c3e6b;--pri-l:#eef1f8;--acc:#e8a020;--acc-l:#fef6e6;
  --win:#27ae60;--win-l:#eafaf1;--loss:#c0392b;--loss-l:#fdedec;
  --tx:#1a1d2e;--tx2:#5a6278;--tx3:#8892a4;--bd:#e2e6f0;--bd2:#c8cfe0;
  --oil:#c0392b;--oil-l:#fff0f0;--med:#2980b9;--med-l:#eaf4fb;--silo:#e8a020;--ass:#7c3aed;--ass-l:#f5f0ff;
}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

.hd{background:var(--primary);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(44,62,107,.18)}
.hd-title{font-size:17px;font-weight:800}.hd-sub{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.06em}
.hd-r{display:flex;align-items:center;gap:8px}
.role-pill{background:rgba(255,255,255,.15);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--win);flex-shrink:0}
.sync-dot.err{background:var(--loss)}.sync-dot.wait{background:var(--acc);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);display:flex;z-index:100;box-shadow:0 -2px 14px rgba(0,0,0,.07)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 7px;font-size:10px;color:var(--tx3);font-weight:500;gap:3px;cursor:pointer;border:none;background:none;font-family:inherit}
.bni.on{color:var(--primary)}.bni svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}
.main{max-width:600px;margin:0 auto;padding:14px 14px 8px}

/* LOGIN */
.login-wrap{min-height:100vh;padding-bottom:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--primary)}
.login-card{background:#fff;border-radius:22px;padding:30px 22px;width:100%;max-width:360px;box-shadow:0 8px 48px rgba(0,0,0,.22)}
.login-icon{width:62px;height:62px;background:var(--primary);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-icon svg{width:34px;height:34px;stroke:#fff;stroke-width:1.8;fill:none}
.login-title{font-size:22px;font-weight:800;color:var(--primary);text-align:center}
.login-sub{font-size:13px;color:var(--tx3);text-align:center;margin:4px 0 22px}
.fl label{font-size:11px;font-weight:700;color:var(--tx2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fl{margin-bottom:14px}
.inp{width:100%;padding:12px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;color:var(--tx);background:#fff;transition:border-color .15s}
.inp:focus{border-color:var(--primary)}
.btn-pri{width:100%;padding:14px;background:var(--primary);color:#fff;border-radius:10px;font-size:15px;font-weight:700;margin-top:6px;cursor:pointer;border:none}
.demo-sep{margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);text-align:center;font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.demo-btn{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:10px;text-align:left;cursor:pointer;background:#fff;margin-bottom:7px;font-family:inherit}
.demo-btn:hover,.demo-btn:active{border-color:var(--primary);background:var(--pri-l)}
.demo-btn-name{font-size:13px;font-weight:700;color:var(--tx)}.demo-btn-desc{font-size:11px;color:var(--tx3);margin-top:2px}

.card{background:var(--card);border-radius:14px;border:1px solid var(--bd);overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ch{padding:12px 15px;border-bottom:1px solid var(--bd);font-weight:700;font-size:14px;color:var(--tx);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ch-sub{font-size:11px;color:var(--tx3);font-weight:400}
.cb{padding:14px}

.stabs{display:flex;gap:3px;margin-bottom:14px;background:var(--pri-l);border-radius:10px;padding:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stab{padding:7px 12px;font-size:13px;border-radius:7px;font-weight:600;color:var(--tx2);white-space:nowrap;border:none;background:none;cursor:pointer;font-family:inherit;flex-shrink:0}
.stab.on{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.1)}

.ttabs{display:flex;gap:8px;margin-bottom:14px}
.ttab{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:2px solid var(--bd);background:var(--card);color:var(--tx3);cursor:pointer;text-align:center;font-family:inherit}
.ttab.on-a{border-color:var(--win);color:var(--win);background:var(--win-l)}
.ttab.on-b{border-color:#2980b9;color:#2980b9;background:#eaf3fb}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sb{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:13px}
.sb-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;font-weight:600}
.sb-v{font-size:22px;font-weight:800;color:var(--tx)}.sb-s{font-size:11px;color:var(--tx3);margin-top:2px}

.rbanner{border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid}
.rbanner.win{background:var(--win-l);border-color:#a9dfbf}.rbanner.loss{background:var(--loss-l);border-color:#f5b7b1}.rbanner.pend{background:var(--acc-l);border-color:#f9e0a8}
.rb-date{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.rb-res{font-size:26px;font-weight:800}.rb-res.win{color:var(--win)}.rb-res.loss{color:var(--loss)}.rb-res.pend{color:var(--acc)}
.score-row{display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.sc-block{text-align:center}.sc-name{font-size:10px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px}.sc-pts{font-size:20px;font-weight:800}.sc-vs{font-size:12px;color:var(--tx3);font-weight:700}

.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
th{font-size:11px;color:var(--tx3);font-weight:600;padding:9px 11px;text-align:left;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.05em;background:#f8f9fc;white-space:nowrap}
td{font-size:13px;padding:9px 11px;border-bottom:1px solid var(--bd);vertical-align:middle;color:var(--tx)}
tr:last-child td{border-bottom:none}

.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;white-space:nowrap}
.bar-w{display:flex;align-items:center;gap:6px}.bar-bg{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;min-width:40px}.bar-f{height:100%;border-radius:3px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}.dot-row{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.wh{display:flex;gap:5px;flex-wrap:wrap}.wh-d{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}

.zc{border-radius:12px;padding:12px;border:2px solid transparent;transition:all .2s;position:relative}
.zc.oil{background:var(--oil-l);border-color:#c0392b33}.zc.med{background:var(--med-l);border-color:#2980b933}
.zc.silo{background:var(--acc-l);border-color:#e8a02044;grid-column:1/-1}.zc.ass{background:var(--ass-l);border-color:#7c3aed33}.zc.sup{background:#f0f4f8;border-color:#8892a433}
.zc.drop-target{border-color:var(--primary);border-style:dashed;transform:scale(1.01)}
.zc-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.zc-name{font-size:12px;font-weight:800}.zc-pts{font-size:10px;color:var(--tx3);margin-top:1px}
.zc-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}

/* PLAYER CHIPS */
.player-chip{background:#fff;border-radius:8px;padding:7px 10px;margin-bottom:4px;font-size:12px;font-weight:600;border:1.5px solid rgba(0,0,0,.09);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:all .15s;touch-action:none;user-select:none}
.player-chip:hover{border-color:var(--primary);background:var(--pri-l)}
.player-chip.selected{border-color:var(--primary);background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(44,62,107,.25)}
.player-chip.dragging{opacity:.4}
.chip-t1{font-size:10px;opacity:.6;white-space:nowrap}
.zc-empty{font-size:11px;color:var(--tx3);font-style:italic;padding:6px 0;text-align:center;border:1.5px dashed var(--bd2);border-radius:6px;margin-bottom:4px}

/* WEIGHT INPUTS */
.weight-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.weight-label{font-size:12px;font-weight:600;flex:1;min-width:0}
.weight-inp{width:54px;padding:5px 8px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-weight:700;text-align:center;color:var(--tx)}
.weight-inp:focus{border-color:var(--primary)}
.weight-bar{flex:2;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;min-width:40px}
.weight-bar-f{height:100%;border-radius:3px;transition:width .3s}
.weight-pct{font-size:11px;color:var(--tx3);min-width:30px;text-align:right}

/* SLOT INPUT */
.slot-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.slot-label{font-size:12px;color:var(--tx2);flex:1}
.slot-btns{display:flex;align-items:center;gap:4px}
.slot-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--bd);background:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;color:var(--primary)}
.slot-num{font-size:15px;font-weight:800;min-width:20px;text-align:center;color:var(--tx)}

.note{background:var(--acc-l);border:1px solid #f9e0a8;border-left:3px solid var(--acc);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--tx2);margin-bottom:12px}
.note.info{background:var(--pri-l);border-color:#c5d0e8;border-left-color:var(--primary);color:var(--primary)}
.note.ok{background:var(--win-l);border-color:#a9dfbf;border-left-color:var(--win);color:#1a6b3a}

.loader{text-align:center;padding:48px;color:var(--tx3);font-size:14px}
.spin{display:inline-block;width:22px;height:22px;border:2px solid var(--bd2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn-out{background:#fff;border:1.5px solid var(--bd);color:var(--tx2)}
.btn-sol{background:var(--primary);color:#fff}.btn-sol:active{opacity:.9}
.btn-ok{background:var(--win-l);color:var(--win);border:1.5px solid #a9dfbf}
.btn-no{background:var(--loss-l);color:var(--loss);border:1.5px solid #f5b7b1}
.btn-acc{background:var(--acc-l);color:var(--acc);border:1.5px solid #f9e0a8}

.fi{width:100%;padding:11px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;color:var(--tx);background:#fff;transition:border-color .15s}
.fi:focus{border-color:var(--primary)}
.fl2{margin-bottom:12px}.fl2 label{font-size:11px;color:var(--tx3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}

.upl{border:2px dashed var(--bd2);border-radius:12px;padding:22px;text-align:center;cursor:pointer;background:#fff;margin-bottom:12px}
.upl:hover,.upl:active{border-color:var(--primary);background:var(--pri-l)}
.upl svg{width:30px;height:30px;stroke:var(--tx3);stroke-width:1.5;margin-bottom:8px;fill:none}
.upl-t{font-size:14px;font-weight:700;color:var(--tx2)}.upl-s{font-size:12px;color:var(--tx3);margin-top:3px}

.kk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kk-box{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:11px}
.kk-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;font-weight:600}.kk-v{font-size:16px;font-weight:800;color:var(--tx)}

.mi{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--bd)}
.mi:last-child{border-bottom:none}
.mav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:var(--pri-l);color:var(--primary)}
.mn{font-size:14px;font-weight:700}.mm{font-size:11px;color:var(--tx3);margin-top:2px}
.mr{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}

.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.qc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:15px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.qc:active{transform:scale(.97)}
.qc-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.qc-ico svg{width:21px;height:21px;stroke-width:2;fill:none;stroke:currentColor}
.qc-t{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px}.qc-s{font-size:11px;color:var(--tx3)}

.cs{text-align:center;padding:60px 24px}.cs-ico{font-size:48px;margin-bottom:16px}
.cs-t{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:8px}.cs-s{font-size:14px;color:var(--tx3)}

/* MOVE HINT */
.move-hint{text-align:center;padding:10px;font-size:12px;color:var(--primary);font-weight:700;background:var(--pri-l);border-radius:8px;margin-bottom:8px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>

// ====== SUPABASE ======
async function sbGet(p){const r=await fetch(SB+'/rest/v1/'+p,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,d){const r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r;}
async function sbPatch(t,q,d){const r=await fetch(SB+'/rest/v1/'+t+'?'+q,{method:'PATCH',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r;}

// ====== AUTH ======
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  const name=(document.getElementById('lu')?.value||'').trim();
  const pw=document.getElementById('lp')?.value||'';
  if(!name||!pw){showLoginErr('Bitte Name und Passwort eingeben.');return;}
  const btn=document.getElementById('login-btn');
  if(btn){btn.textContent='Anmelden…';btn.disabled=true;}
  try{
    const hash=await sha256(pw);
    // ilike = case-insensitive name match
    const rows=await sbGet('ws_players?name=ilike.'+encodeURIComponent(name)+'&select=name,role,ws_admin,profile_edit,password_hash,access_enabled,can_reset_password');
    if(!rows||!rows.length){showLoginErr('Spieler „'+name+'" nicht gefunden.');if(btn){btn.textContent='Anmelden';btn.disabled=false;}return;}
    const pl=rows[0];
    if(!pl.access_enabled){showLoginErr('Kein Zugang — wende dich an den Admin.');if(btn){btn.textContent='Anmelden';btn.disabled=false;}return;}
    if(!pl.password_hash){showLoginErr('Kein Passwort gesetzt — Admin muss zuerst eines vergeben.');if(btn){btn.textContent='Anmelden';btn.disabled=false;}return;}
    if(pl.password_hash!==hash){showLoginErr('Falsches Passwort.');if(btn){btn.textContent='Anmelden';btn.disabled=false;}return;}
    const roleMap={R5:'r5',R4:'r4',R3:'r3',R2:'r2',R1:'r1'};
    const isSuperAdmin=pl.name==='Ben_the_men';
    APP.user={
      username:pl.name.toLowerCase().replace(/\s/g,'_'),
      playerName:pl.name,
      role:isSuperAdmin?'superadmin':(roleMap[pl.role]||'r3'),
      ws_admin:pl.ws_admin||false,
      profile_edit:pl.profile_edit||false,
      can_reset_password:pl.can_reset_password||false,
    };
    renderShell();loadData();
  }catch(e){showLoginErr('Fehler: '+e.message);if(btn){btn.textContent='Anmelden';btn.disabled=false;}}
}

async function loadData(){
  setSyncDot('wait');
  try{
    const[ev,pa,pl,hist]=await Promise.all([
      sbGet('ws_events?order=event_date.desc,team.asc'),
      sbGet('ws_participation?order=rank.asc'),
      sbGet('ws_players?order=t1.desc.nullslast&select=*,access_enabled,password_hash'),
      sbGet('ws_player_history?order=recorded_at.desc&limit=500'),
    ]);
    APP.data={events:ev,participation:pa,players:pl};
    // Index history by player_name
    APP.playerHistory={};
    hist.forEach(h=>{
      if(!APP.playerHistory[h.player_name])APP.playerHistory[h.player_name]=[];
      APP.playerHistory[h.player_name].push(h);
    });
    APP.synced=true;APP.syncErr=false;setSyncDot('ok');
    loadWSState();
    if(!APP.accepted.length)APP.accepted=pl.map(p=>p.name);

// ====== HELPERS ======
function fmt(n){return n?Number(n).toLocaleString('de-DE'):'–';}
function badge(t,c){return`<span class="badge" style="background:${c}22;color:${c}">${t}</span>`;}
function roleBadge(r){return badge(ROLES[r]||r,ROLE_C[r]||'#8892a4');}
function canAccess(f){
  const u=APP.user;if(!u)return false;if(u.role==='superadmin')return true;
  if(f==='ws')return u.role==='r5'||u.role==='r4';
  if(f==='ws_admin'){
    // WS-Admin: superadmin oder Spieler mit ws_admin=true in DB
    const pl=APP.data.players.find(p=>p.name===u.playerName);
    return u.role==='r5'||(pl&&pl.ws_admin);
  }
  if(f==='profile_edit'){
    // Profil bearbeiten: superadmin, r5, oder Spieler mit profile_edit=true
    const pl=APP.data.players.find(p=>p.name===u.playerName);
    return u.role==='r5'||(pl&&pl.profile_edit);
  }
  if(f==='allianz')return u.role==='r5'||u.role==='r4';
  if(f==='admin')return u.role==='superadmin';
  return true;
}
function reliability(name){const p=APP.data.participation.filter(x=>{const ev=APP.data.events.find(e=>e.id===x.event_id);return ev&&x.player_name===name;});if(!p.length)return null;return Math.round(p.filter(x=>x.played).length/p.length*100);}
function relColor(pct){if(pct===null)return'var(--tx3)';if(pct>=80)return'var(--win)';if(pct>=50)return'var(--acc)';return'var(--loss)';}
function avgPts(name){const p=APP.data.participation.filter(x=>x.player_name===name&&x.played&&x.individual_pts);if(!p.length)return 0;return Math.round(p.reduce((s,x)=>s+(x.individual_pts||0),0)/p.length);}
function getT1(name){return parseFloat(APP.data.players.find(p=>p.name===name)?.t1)||0;}
function fmtK(n){if(!n)return'–';if(n>=1000000)return(n/1000000).toLocaleString('de-DE',{maximumFractionDigits:1})+'M';if(n>=1000)return Math.round(n/1000)+'K';return String(n);}
function roleRank(r){return{R5:5,R4:4,R3:3,R2:2,R1:1}[r]||2;}
function rankBadge(r){const c={R5:'#f39c12',R4:'#9b59b6',R3:'#7f8c8d',R2:'#95a5a6',R1:'#bdc3c7'}[r||'R3']||'#7f8c8d';return`<span style="font-size:10px;font-weight:800;color:${c};background:${c}22;padding:2px 6px;border-radius:4px;flex-shrink:0">${r||'R3'}</span>`;}
function sortPlayers(list){
  const s=APP.playerSort;
  return[...list].sort((a,b)=>{
    const ai=isInactive(a.name),bi=isInactive(b.name);
    if(ai!==bi)return ai?1:-1; // inactive always last
    // Primary: role rank descending
    const rra=roleRank(a.role),rrb=roleRank(b.role);
    if(rra!==rrb)return rrb-rra;
    // Secondary: selected sort
    if(s==='t1')return(parseFloat(b.t1)||0)-(parseFloat(a.t1)||0);
    if(s==='kills')return(b.kills||0)-(a.kills||0);
    if(s==='popularity')return(b.popularity||0)-(a.popularity||0);
    if(s==='profession_level')return(b.profession_level||0)-(a.profession_level||0);
    if(s==='reliability'){const ra=reliability(a.name)??-1,rb=reliability(b.name)??-1;return rb-ra;}
    return a.name.localeCompare(b.name);
  });
}
function getLineup(t){return t==='B'?APP.lineupB:APP.lineupA;}
function setLineup(t,v){if(t==='B')APP.lineupB=v;else APP.lineupA=v;}
function getLineupReady(t){return t==='B'?APP.lineupReadyB:APP.lineupReadyA;}

function getMondayOfWeek(){const d=new Date();const day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return d.toISOString().slice(0,10);}
async function ensureWeeklyEvents(){
  const monday=getMondayOfWeek();
  const exists=APP.data.events.some(e=>e.event_date===monday);
  if(!exists){
    await sbPost('ws_events',[{event_date:monday,team:'A',time_slot:'13:00 Uhr',result:'pending'},{event_date:monday,team:'B',time_slot:'22:30 Uhr',result:'pending'}]);

    APP.data.events=ev;renderPage();
  }
}

// Simulator: see sim.js
// --- ERGEBNIS (Event-Historie + Drill-Down) ---
function wsErgebnis(){
  if(APP.wsEventId)return wsErgebnisDrilldown(APP.wsEventId);
  const allEvts=APP.data.events.sort((a,b)=>b.event_date.localeCompare(a.event_date));
  if(!allEvts.length)return`<div class="loader">Noch keine Events vorhanden.</div>`;
  // Stats across all done events
  const done=allEvts.filter(e=>e.result&&e.result!=='pending');
  const wins=done.filter(e=>e.result==='win').length;
  const rate=done.length?Math.round(wins/done.length*100):0;
  let h=`<div class="sg"><div class="sb"><div class="sb-l">Siege</div><div class="sb-v" style="color:var(--win)">${wins}</div></div><div class="sb"><div class="sb-l">Niederlagen</div><div class="sb-v" style="color:var(--loss)">${done.length-wins}</div></div><div class="sb"><div class="sb-l">Siegquote</div><div class="sb-v" style="color:var(--win)">${rate}%</div></div><div class="sb"><div class="sb-l">Events</div><div class="sb-v">${done.length}</div></div></div>`;
  // Group by date
  const dates=[...new Set(allEvts.map(e=>e.event_date))];
  h+=`<div class="card"><div class="ch">Alle Events <span class="ch-sub">Tippen für Details</span></div>`;
  dates.forEach(date=>{
    const dayEvts=allEvts.filter(e=>e.event_date===date);
    const hasPending=dayEvts.some(e=>!e.result||e.result==='pending');
    h+=`<div style="padding:8px 14px 4px;font-size:12px;font-weight:800;color:var(--tx3);background:var(--bg2);border-bottom:1px solid var(--bd);letter-spacing:.3px">${date}${hasPending?' <span style="font-size:10px;color:var(--acc);font-weight:700">● Diese Woche</span>':''}</div>`;
    ['A','B'].forEach(team=>{
      const e=dayEvts.find(ev=>ev.team===team);
      if(!e)return;
      const isP=!e.result||e.result==='pending';
      const isW=e.result==='win';
      const c=isP?'var(--acc)':isW?'var(--win)':'var(--loss)';
      const label=isP?'Ausstehend':isW?'Sieg':'Niederlage';
      const ps=APP.data.participation.filter(p=>p.event_id===e.id);
      const played=ps.filter(p=>p.played).length;
      const diff=e.our_pts&&e.opp_pts?(e.our_pts>e.opp_pts?'+':'')+fmt(e.our_pts-e.opp_pts):'';
      h+=`<div class="mi" style="cursor:pointer;padding-left:22px" onclick="APP.wsEventId='${e.id}';renderPage()">
        <div style="width:36px;height:36px;border-radius:9px;background:${c}22;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:${c};flex-shrink:0">${isP?'?':isW?'S':'N'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">Team ${team}${e.time_slot?' · '+e.time_slot:''}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:2px">${e.opponent||'Gegner unbekannt'}${diff?' · Diff: '+diff:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0">
          ${badge(label,c)}
          ${ps.length?`<span style="font-size:10px;color:var(--tx3)">${played}/${ps.length}</span>`:''}
        </div>
      </div>`;
    });
  });
  h+=`</div>`;
  return h;
}

function wsErgebnisDrilldown(eventId){
  const ev=APP.data.events.find(e=>e.id===eventId);
  if(!ev)return`<div class="loader">Event nicht gefunden.</div>`;
  const ps=APP.data.participation.filter(p=>p.event_id===ev.id);
  const played=ps.filter(p=>p.played),missed=ps.filter(p=>!p.played);
  const excused=missed.filter(p=>p.excused),absent=missed.filter(p=>!p.excused);
  const tot=played.reduce((s,p)=>s+(p.individual_pts||0),0);
  const mx=Math.max(...played.map(p=>p.individual_pts||0),1);
  const isW=ev.result==='win',isP=!ev.result||ev.result==='pending';
  const bc=isP?'pend':isW?'win':'loss';
  const rt=isP?'Ausstehend':isW?'SIEG':'NIEDERLAGE';
  let h=`<button class="btn btn-out btn-sm" onclick="APP.wsEventId=null;renderPage()" style="margin-bottom:12px">← Alle Events</button>`;
  h+=`<div class="rbanner ${bc}">
    <div class="rb-date">${ev.event_date}${ev.time_slot?' · '+ev.time_slot:''}</div>
    <div class="rb-res ${bc}">${rt}</div>
    <div class="score-row">
      <div class="sc-block"><div class="sc-name">AR1S</div><div class="sc-pts" style="color:${isP?'var(--acc)':isW?'var(--win)':'var(--loss)'}">${fmt(ev.our_pts)}</div></div>
      <div class="sc-vs">VS</div>
      <div class="sc-block"><div class="sc-name">${ev.opponent||'Gegner'}</div><div class="sc-pts" style="color:var(--tx3)">${fmt(ev.opp_pts)}</div></div>
      ${ev.our_pts&&ev.opp_pts?`<div class="sc-block"><div class="sc-name">Differenz</div><div class="sc-pts" style="color:${ev.our_pts>ev.opp_pts?'var(--win)':'var(--loss)'}">${ev.our_pts>ev.opp_pts?'+':''}${fmt(ev.our_pts-ev.opp_pts)}</div></div>`:''}
    </div></div>`;
  h+=`<div class="sg"><div class="sb"><div class="sb-l">Gespielt</div><div class="sb-v" style="color:var(--win)">${played.length}</div></div><div class="sb"><div class="sb-l">Gefehlt</div><div class="sb-v" style="color:${absent.length?'var(--loss)':'var(--tx3)'}">${absent.length}</div></div><div class="sb"><div class="sb-l">Entschuldigt</div><div class="sb-v" style="color:var(--acc)">${excused.length}</div></div><div class="sb"><div class="sb-l">Quote</div><div class="sb-v" style="color:var(--win)">${ps.length?Math.round(played.length/ps.length*100):0}%</div></div></div>`;
  if(ps.length){
    const rows=[...played].sort((a,b)=>(a.rank||99)-(b.rank||99)).map(p=>{
      const pct=Math.round((p.individual_pts||0)/mx*100);
      const share=tot?((p.individual_pts||0)/tot*100).toFixed(1):'0';
      const rc=p.rank===1?'#f1c40f':p.rank===2?'#aaa':p.rank===3?'#cd7f32':'var(--tx3)';
      const zc=p.zone?.includes('Assassin')?'var(--ass)':p.zone?.includes('1')||p.zone?.includes('3')?'var(--oil)':'var(--med)';
      const inact=isInactive(p.player_name);
      const pl=APP.data.players.find(x=>x.name===p.player_name);
      const t1=pl?.t1!=null?pl.t1.toFixed(1):'–';
      return`<tr style="${inact?'opacity:.45;background:#fafafa':''}"><td style="font-weight:800;color:${rc}">${p.rank||'–'}</td><td><strong style="cursor:pointer;color:var(--primary)" onclick="openPlayer('${p.player_name.replace(/'/g,"\\'")}')"> ${p.player_name}</strong>${inact?` <span style="font-size:9px;color:#e67e22;font-weight:700">AUSGETRETEN</span>`:''}</td><td>${p.zone?badge(p.zone,zc):'–'}</td><td style="font-size:11px;color:var(--tx2);font-weight:600">${t1}M</td><td style="font-weight:700">${fmt(p.individual_pts)}</td><td><div class="bar-w"><div class="bar-bg"><div class="bar-f" style="width:${pct}%;background:${p.rank<=3?'#f1c40f':'var(--primary)'}"></div></div><span style="font-size:10px;color:var(--tx3)">${share}%</span></div></td></tr>`;}).join('');
    const missedRows=missed.map(p=>{const inact=isInactive(p.player_name);const pl=APP.data.players.find(x=>x.name===p.player_name);const t1=pl?.t1!=null?pl.t1.toFixed(1):'–';return`<tr style="opacity:.55;${inact?'background:#fafafa':''}"><td>–</td><td>${p.player_name}${inact?` <span style="font-size:9px;color:#e67e22;font-weight:700">AUSGETRETEN</span>`:''}</td><td>${p.zone?badge(p.zone,'var(--tx3)'):'–'}</td><td style="font-size:11px;color:var(--tx3)">${t1}M</td><td>–</td><td>${badge(p.excused?'Entschuldigt':'Gefehlt',p.excused?'var(--acc)':'var(--loss)')}</td></tr>`;}).join('');
    h+=`<div class="card"><div class="ch">Individuelle Punkte</div><div class="scroll-x"><table><thead><tr><th>#</th><th>Spieler</th><th>Zone</th><th>T1</th><th>Punkte</th><th>Anteil</th></tr></thead><tbody>${rows}${missedRows}</tbody></table></div></div>`;
  }else{h+=`<div class="note">Noch keine Teilnahme-Daten für dieses Event.</div>`;}
  return h;
}

// --- VERLAUF ---
function wsVerlauf(){
  const evts=APP.data.events.filter(e=>e.team===APP.team&&e.result!=='pending');
  const wins=evts.filter(e=>e.result==='win').length;
  const losses=evts.filter(e=>e.result==='loss').length;
  const rate=evts.length?Math.round(wins/evts.length*100):0;
  return`<div class="sg"><div class="sb"><div class="sb-l">Siege</div><div class="sb-v" style="color:var(--win)">${wins}</div></div><div class="sb"><div class="sb-l">Niederlagen</div><div class="sb-v" style="color:var(--loss)">${losses}</div></div><div class="sb"><div class="sb-l">Siegquote</div><div class="sb-v" style="color:var(--win)">${rate}%</div></div><div class="sb"><div class="sb-l">Events</div><div class="sb-v">${evts.length}</div></div></div>
    <div class="card" style="padding:14px;margin-bottom:12px"><div style="font-size:11px;color:var(--tx3);text-transform:uppercase;font-weight:600;letter-spacing:.04em;margin-bottom:10px">Verlauf</div><div class="wh">${evts.map(e=>{const c=e.result==='win'?'var(--win)':'var(--loss)';return`<div class="wh-d" style="background:${c}22;color:${c}" title="${e.event_date} vs ${e.opponent||'?'}">${e.result==='win'?'S':'N'}</div>`;}).join('')}</div></div>
    <div class="card"><div class="ch">Alle Kämpfe – Team ${APP.team}</div><div class="scroll-x"><table><thead><tr><th>Datum</th><th>Gegner</th><th>Wir</th><th>Gegner</th><th>Diff</th><th>Ergebnis</th></tr></thead><tbody>${evts.map(e=>{const c=e.result==='win'?'var(--win)':'var(--loss)';const diff=e.our_pts&&e.opp_pts?(e.our_pts>e.opp_pts?'+':'')+fmt(e.our_pts-e.opp_pts):'–';return`<tr><td style="white-space:nowrap">${e.event_date}</td><td>${e.opponent||'–'}</td><td><strong>${fmt(e.our_pts)}</strong></td><td>${fmt(e.opp_pts)}</td><td style="color:${c};font-weight:700">${diff}</td><td>${badge(e.result==='win'?'Sieg':'Niederlage',c)}</td></tr>`;}).join('')}</tbody></table></div></div>`;}

  </div>`;
}

    <!-- AUTO-AUFSTELLEN direkt unter der Aufstellung -->

    <!-- EINSTELLUNGEN -->
    <div class="card" style="margin-bottom:12px">
      <div class="ch">Zonen-Gewichtung (Wichtigkeit)</div>
      <div class="cb">

        ${Object.entries(APP.zoneWeights).map(([k,v])=>{
          const pct=Math.round(v/totalW*100);

          const label={z1:'Zone 1 (Ölraffinerie)',z2:'Zone 2 (Lazarett)',z3:'Zone 3 (Ölraffinerie)',z4:'Zone 4 (Lazarett)'}[k];
          return`<div class="weight-row">
            <div class="weight-label" style="color:${c}">${label}</div>
            <input class="weight-inp" type="number" min="0" max="100" value="${v}" id="w-${k}" oninput="updateWeight('${k}',this.value)">
            <div class="weight-bar"><div class="weight-bar-f" style="width:${pct}%;background:${c}"></div></div>

    <!-- SPIELER SLOTS PRO ZONE -->
    <div class="card" style="margin-bottom:12px">

// Drag & Drop handlers
function dragStart(e,name,fromZone){
  APP.selectedChip=name;APP.selectedFromZone=fromZone;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',name);
  // delay so the element isn't hidden before the drag ghost is captured
  requestAnimationFrame(()=>{const el=document.getElementById('chip-'+name.replace(/\s/g,'_'));if(el)el.classList.add('dragging');});}
function dragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('.zc').forEach(el=>el.classList.remove('drop-target'));
  APP.selectedChip=null;APP.selectedFromZone=null;
  renderPage();}
function handleDrop(e,toZone){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.zc').forEach(el=>el.classList.remove('drop-target'));
  if(APP.selectedChip)moveChip(APP.selectedChip,APP.selectedFromZone,toZone);}
function dragEnterZone(e,zone){e.preventDefault();document.getElementById('zone-'+zone).classList.add('drop-target');}
function dragLeaveZone(e,zone){
  const el=document.getElementById('zone-'+zone);
  if(el&&!el.contains(e.relatedTarget))el.classList.remove('drop-target');}

// Tap-to-select (mobile)
function selectChip(name,zone){
  if(APP.selectedChip===name){APP.selectedChip=null;APP.selectedFromZone=null;}
  else{APP.selectedChip=name;APP.selectedFromZone=zone;}
  renderPage();}
function dropToZone(zone){
  if(!APP.selectedChip)return;
  if(APP.selectedFromZone===zone){APP.selectedChip=null;APP.selectedFromZone=null;renderPage();return;}
  moveChip(APP.selectedChip,APP.selectedFromZone,zone);
}
function moveChip(name,fromZone,toZone){
  const t=APP.team;
  const L=getLineup(t);
  if(fromZone&&L[fromZone])L[fromZone]=L[fromZone].filter(n=>n!==name);
  Object.keys(L).forEach(k=>{if(k!==toZone)L[k]=L[k].filter(n=>n!==name);});
  if(!L[toZone])L[toZone]=[];
  if(!L[toZone].includes(name))L[toZone].push(name);
  setLineup(t,L);
  APP.selectedChip=null;APP.selectedFromZone=null;
  setLineupReady(t,true);
  saveWSState();
  renderPage();}

function updateWeight(k,v){APP.zoneWeights[k]=Math.max(0,Math.min(100,parseInt(v)||0));renderPage();}
function changeSlot(k,d){const min=k==='ass'?2:k==='sup'?0:1;APP.zoneSlots[k]=Math.max(min,Math.min(10,(APP.zoneSlots[k]||0)+d));renderPage();}

function autoAssign(){
  const t=APP.team;
  const teamPool=Object.entries(APP.teamAssign).filter(([,v])=>v===t).map(([k])=>k);
  // Alle Spieler nach T1 absteigend sortieren (stärkste zuerst)
  const pool=(teamPool.length?teamPool:[...APP.accepted]).sort((a,b)=>getT1(b)-getT1(a));
  const newL={ass:[],sup:[],z1:[],z2:[],z3:[],z4:[]};
  let remaining=[...pool];

  // Phase 1: Assassinen ZUERST — Top N (stärkste Spieler nach T1)
  newL.ass=remaining.splice(0,Math.min(APP.zoneSlots.ass,remaining.length));

  // Phase 2: Sammler & Endgame-Support — schwächste N Spieler vom Ende (optional, sup=0 → überspringen)
  if(APP.zoneSlots.sup>0){
    if(remaining.length>=APP.zoneSlots.sup){
      newL.sup=remaining.splice(remaining.length-APP.zoneSlots.sup,APP.zoneSlots.sup);
    } else if(remaining.length>0){
      newL.sup=remaining.splice(0,remaining.length);
    }
  }

  // Phase 3: Zonen befüllen
  const stealKey=APP.teamSide==='left'?'z4':APP.teamSide==='right'?'z2':null;
  const zoneOrder=Object.entries(APP.zoneWeights)
    .sort(([,a],[,b])=>b-a)
    .map(([k])=>k)
    .filter(k=>k!==stealKey);

  if(stealKey){
    // Steal-Strategie aktiv:
    // Z1 zuerst voll füllen (Info Center +10% → wichtigste Zone)
    const topZone=zoneOrder[0]; // z1 (höchstes Gewicht)
    while(remaining.length&&newL[topZone].length<APP.zoneSlots[topZone]){
      newL[topZone].push(remaining.shift());
    }
    // Restliche Zonen (z3 + aktives Lazarett) im Round-Robin befüllen,
    // damit die Lazarett-Zone (Z5-Sturmgruppe) mittelstarke Spieler bekommt
    const otherZones=zoneOrder.slice(1);
    let rri=0;
    while(remaining.length){
      let placed=false;
      for(let attempt=0;attempt<otherZones.length;attempt++){
        const z=otherZones[(rri+attempt)%otherZones.length];
        if(newL[z].length<APP.zoneSlots[z]){
          newL[z].push(remaining.shift());
          rri=(rri+1)%otherZones.length;
          placed=true;break;
        }
      }
      if(!placed)break;
    }
  } else {
    // Kein Steal: sequenziell nach Gewichtung füllen (alle Zonen gleich behandeln)
    for(const z of zoneOrder){
      while(remaining.length&&newL[z].length<APP.zoneSlots[z]){
        newL[z].push(remaining.shift());
      }
    }
    // Übrige gleichmäßig verteilen
    for(const z of zoneOrder){
      if(remaining.length)newL[z].push(remaining.shift());
    }
  }

  setLineup(t,newL);
  setLineupReady(t,true);
  APP.selectedChip=null;
  saveWSState();
  renderPage();
}
function resetLineup(){
  const t=APP.team;
  setLineup(t,{ass:[],sup:[],z1:[],z2:[],z3:[],z4:[]});
  setLineupReady(t,false);
  APP.selectedChip=null;
  saveWSState();
  renderPage();
}

function buildMailText(t,intro){
  const L=getLineup(t);
  const time=t==='A'?'13:00':'22:30';
  const lines=[];
  lines.push(`--- Aufstellung Wüstensturm – Team ${t} (${time} Uhr) ---`);
  if((L.ass||[]).length) lines.push(`⚔ Assassinen: ${L.ass.join(', ')}`);
  if((L.sup||[]).length) lines.push(`🛡 Sammler & Endgame-Support: ${L.sup.join(', ')}`);
  if((L.z1||[]).length) lines.push(`Zone 1 (Ölraffinerie): ${L.z1.join(', ')}`);
  if((L.z2||[]).length) lines.push(`Zone 2 (Lazarett): ${L.z2.join(', ')}`);
  if((L.z3||[]).length) lines.push(`Zone 3 (Ölraffinerie): ${L.z3.join(', ')}`);
  if((L.z4||[]).length) lines.push(`Zone 4 (Lazarett): ${L.z4.join(', ')}`);
  return(intro?intro+'\n\n':'')+lines.join('\n');
}
function exportMail(){
  const t=APP.team;
  const intro=APP.mailText[t]||MAIL_DEFAULT;
  const mail=buildMailText(t,intro);
  navigator.clipboard.writeText(mail).then(()=>{
    const btn=document.querySelector('.btn-sol[onclick="exportMail()"]');
    if(btn){btn.textContent='✅ Kopiert!';setTimeout(()=>{btn.textContent='📋 Kopieren';},2000);}
  }).catch(()=>prompt('Mail-Text:',mail));
}
function exportMailFor(t,btnId){
  const intro=APP.mailText[t]||MAIL_DEFAULT;
  const general=APP.mailGeneral?APP.mailGeneral+'\n\n':'';
  const mail=general+buildMailText(t,intro);
  navigator.clipboard.writeText(mail).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='✅ Kopiert!';setTimeout(()=>{btn.textContent='📋 Team '+t+' kopieren';},2000);}
  }).catch(()=>prompt('Mail Team '+t+':',mail));
}
function wsMailExport(){
  const generalText=APP.mailGeneral||'';
  function mailBlock(t){
    const intro=APP.mailText[t]||MAIL_DEFAULT;
    const general=generalText?generalText+'\n\n':'';
    const mail=general+buildMailText(t,intro);
    const teamColor=t==='A'?'#2980b9':'#e67e22';
    const teamBg=t==='A'?'#e8f4fd':'#fdf0e8';
    const time=t==='A'?'13:00':'22:30';
    const L=getLineup(t);
    const hasLineup=Object.values(L).some(arr=>arr.length>0);
    return`<div class="card" style="margin-bottom:14px;border:2px solid ${teamColor}22">
      <div class="ch" style="color:${teamColor}">⚔ Team ${t} · ${time} Uhr</div>
      <div class="cb">
        <label style="font-size:11px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px">Einleitung Team ${t} (optional)</label>
        <textarea rows="8" placeholder="Hallo Team ${t}, hier ist die Aufstellung…"
          style="width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none;margin-bottom:10px"
          oninput="APP.mailText['${t}']=this.value;saveWSState()">${intro}</textarea>
        ${hasLineup
          ?`<div style="background:#f4f6fb;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;color:var(--tx);border:1px solid var(--bd);margin-bottom:10px;line-height:1.6">${(general+buildMailText(t,intro)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <button id="copy-team-${t}" class="btn btn-sol" style="width:100%;background:${teamColor}" onclick="exportMailFor('${t}','copy-team-${t}')">📋 Team ${t} kopieren</button>`
          :`<div class="note" style="background:${teamBg};border:1px solid ${teamColor}33;color:${teamColor}">Noch keine Aufstellung für Team ${t} vorhanden. Zuerst im Tab <strong>Aufstellung</strong> planen.</div>`}

  }
  return`
    <div class="card" style="margin-bottom:14px">
      <div class="ch">Allgemeiner Text <span class="ch-sub">erscheint oben in beiden Mails</span></div>
      <div class="cb">
        <textarea rows="3" placeholder="z.B. Hallo zusammen, hier die Aufstellung für heute Abend…"
          style="width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none"
          oninput="APP.mailGeneral=this.value;saveWSState()">${generalText}</textarea>
      </div>
    </div>
    ${mailBlock('A')}
    ${mailBlock('B')}`;
}

function playCount(name){return APP.data.participation.filter(x=>x.player_name===name&&x.played).length;}
function wsAnmeldung(){
  const monday=getMondayOfWeek();
  const curEvt=APP.data.events.find(e=>e.event_date===monday&&e.team===APP.team);
  const closed=APP.anmeldungClosed;
  const players=APP.data.players.filter(p=>!isInactive(p.name)).sort((a,b)=>{
    const rr=roleRank(b.role)-roleRank(a.role);
    return rr!==0?rr:a.name.localeCompare(b.name);
  });
  const ta=players.filter(p=>APP.teamAssign[p.name]==='A');
  const tb=players.filter(p=>APP.teamAssign[p.name]==='B');
  const tn=players.filter(p=>!APP.teamAssign[p.name]);
  function assignRow(p){
    const t=APP.teamAssign[p.name];
    const rel=reliability(p.name);const rc=relColor(rel);
    const pc=playCount(p.name);const ap=avgPts(p.name);
    const safe=p.name.replace(/'/g,"\\'");
    return`<div class="mi" style="${closed&&!t?'opacity:.38':''}">
      <div class="mav" style="background:${t==='A'?'#e8f4fd':t==='B'?'#fdf0e8':'var(--bg2)'};color:${t==='A'?'#2980b9':t==='B'?'#e67e22':'var(--tx3)'};font-size:13px;font-weight:800">${t||'–'}</div>
      <div style="flex:1;min-width:0">
        <div class="mn" style="display:flex;align-items:center;gap:5px"><span style="cursor:pointer;color:var(--primary)" onclick="openPlayer('${safe}')">${p.name}</span>${rankBadge(p.role||'R3')}</div>
        <div class="mm" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px">
          <span>T1 <strong>${p.t1||'–'}</strong></span>
          <span style="color:${rc}">Quote <strong>${rel!==null?rel+'%':'Neu'}</strong></span>
          <span>Ø <strong>${ap?fmtK(ap):'-'}</strong></span>
          <span>Spiele <strong>${pc}</strong></span>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn btn-sm ${t==='A'?'btn-sol':'btn-out'}" style="padding:4px 9px;font-size:12px" onclick="setTeamAssign('${safe}','A')">A</button>
        <button class="btn btn-sm ${t==='B'?'btn-sol':'btn-out'}" style="padding:4px 9px;font-size:12px;background:${t==='B'?'#e67e22':''};" onclick="setTeamAssign('${safe}','B')">B</button>
        ${t?`<button class="btn btn-sm btn-out" style="padding:4px 7px;font-size:12px;color:var(--tx3)" onclick="setTeamAssign('${safe}',null)">✕</button>`:''}
      </div>
    </div>`;
  }
  let h=``;
  // Upload area
  h+=`<div class="card" style="margin-bottom:10px"><div class="ch">Screenshot hochladen <span class="ch-sub">Anmeldeliste aus dem Spiel</span></div>
    <div class="cb"><div class="upl" onclick="document.getElementById('ssUp').click()">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <div class="upl-t">Screenshot Anmeldeliste</div><div class="upl-s">OCR liest Spielernamen · oder manuell unten zuweisen</div>
      <input type="file" id="ssUp" accept="image/*" style="display:none" onchange="handleSSUp(this)">
    </div></div></div>`;
  // Summary + close button
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-size:13px;font-weight:700;flex:1">Team A: <strong style="color:#2980b9">${ta.length}</strong> · Team B: <strong style="color:#e67e22">${tb.length}</strong> · Offen: ${tn.length}</span>
    ${!closed?`<button class="btn btn-ok btn-sm" onclick="APP.anmeldungClosed=true;APP.accepted=[...new Set([...Object.entries(APP.teamAssign).filter(([,v])=>v).map(([k])=>k)])];saveWSState();renderPage()">Anmeldung schließen</button>`
    :`<span style="color:var(--win);font-weight:700;font-size:12px">✓ Anmeldung geschlossen</span><button class="btn btn-out btn-sm" onclick="APP.anmeldungClosed=false;saveWSState();renderPage()">Öffnen</button>`}
  </div>`;
  if(closed){
    h+=`<div class="note info" style="margin-bottom:10px">Anmeldung abgeschlossen · <strong>${ta.length}</strong> Spieler für Team A · <strong>${tb.length}</strong> für Team B · Weiter zur Aufstellung.</div>`;}
  // Player list
  h+=`<div class="card">`;
  if(ta.length){h+=`<div style="padding:7px 14px 3px;font-size:11px;font-weight:800;color:#2980b9;background:#e8f4fd33;border-bottom:1px solid #2980b922">── Team A (${ta.length}) ──</div>`;ta.forEach(p=>{h+=assignRow(p);});}
  if(tb.length){h+=`<div style="padding:7px 14px 3px;font-size:11px;font-weight:800;color:#e67e22;background:#fdf0e833;border-bottom:1px solid #e67e2222">── Team B (${tb.length}) ──</div>`;tb.forEach(p=>{h+=assignRow(p);});}
  if(tn.length){h+=`<div style="padding:7px 14px 3px;font-size:11px;font-weight:800;color:var(--tx3);background:var(--bg2);border-bottom:1px solid var(--bd)">── Noch nicht zugeteilt (${tn.length}) ──</div>`;tn.forEach(p=>{h+=assignRow(p);});}
  h+=`</div>`;
  return h;
}
const LS_KEY='warsync_ws_state';
function saveWSState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({
    teamAssign:APP.teamAssign,
    anmeldungClosed:APP.anmeldungClosed,
    lineupA:APP.lineupA,lineupB:APP.lineupB,
    lineupReadyA:APP.lineupReadyA,lineupReadyB:APP.lineupReadyB,
    mailText:APP.mailText,
    mailGeneral:APP.mailGeneral,
    teamSide:APP.teamSide,
    stealTime:APP.stealTime,
    infoCardOpen:APP.infoCardOpen,
  }));}catch(e){}
}
function loadWSState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const s=JSON.parse(raw);
    if(s.teamSide)APP.teamSide=s.teamSide;
    if(s.stealTime!==undefined)APP.stealTime=s.stealTime;
    if(s.infoCardOpen!==undefined)APP.infoCardOpen=s.infoCardOpen;
    if(s.teamAssign)APP.teamAssign=s.teamAssign;
    if(s.anmeldungClosed!==undefined)APP.anmeldungClosed=s.anmeldungClosed;
    if(s.lineupA)APP.lineupA=s.lineupA;
    if(s.lineupB)APP.lineupB=s.lineupB;
    if(s.lineupReadyA!==undefined)APP.lineupReadyA=s.lineupReadyA;
    if(s.lineupReadyB!==undefined)APP.lineupReadyB=s.lineupReadyB;
    if(s.mailText)APP.mailText=s.mailText;
    if(s.mailGeneral!==undefined)APP.mailGeneral=s.mailGeneral.trim().length>5?s.mailGeneral:'';
  }catch(e){}
}
function setTeamAssign(name,team){
  if(team)APP.teamAssign[name]=team;else delete APP.teamAssign[name];
  saveWSState();
  renderPage();
}
function toggleAccept(name){
  if(APP.accepted.includes(name))APP.accepted=APP.accepted.filter(n=>n!==name);
  else APP.accepted.push(name);renderPage();}
function acceptAll(){APP.accepted=APP.data.players.filter(p=>!isInactive(p.name)).map(p=>p.name);renderPage();}
function rejectAll(){APP.accepted=[];renderPage();}
function handleSSUp(){alert('Screenshot erkannt!\nOCR-Analyse: Spielernamen werden erkannt und automatisch zugewiesen (folgt in V2).');}

function wsSpieler(){
  if(APP.selectedPlayer)return wsPlayerProfile(APP.selectedPlayer);
  const pl=APP.data.players;
  const sorted=sortPlayers(pl);
  const active=pl.filter(p=>!isInactive(p.name)).length;
  const s=APP.playerSort;

  const SORTS=[
    {k:'t1',l:'T1 ↓'},
    {k:'kills',l:'⚔ Kills'},
    {k:'popularity',l:'❤ Beliebtheit'},
    {k:'profession_level',l:'Beruf-Lvl'},
    {k:'reliability',l:'Quote'},
    {k:'name',l:'A–Z'},
  ];

  function profInfo(p){
    const prof=p.profession||'Ingenieur';
    const isK=prof==='Kriegsführer';
    return{prof,isK,icon:isK?'⚔':'🔧',color:isK?'var(--ass)':'var(--primary)',bg:isK?'var(--ass-l)':'var(--pri-l)'};
  }

  function playerRow(p){
    const inactive=isInactive(p.name);
    const rel=reliability(p.name);
    const {prof,isK,icon,color,bg}=profInfo(p);
    const pRole=inactive?null:(p.role||'R3');
    const stats=[
      p.t1?`<span style="white-space:nowrap">T1 <strong>${p.t1}M</strong></span>`:'',
      p.kills?`<span style="white-space:nowrap">${icon} ${fmtK(p.kills)}</span>`:'',
      p.popularity?`<span style="white-space:nowrap">❤ ${fmt(p.popularity)}</span>`:'',
      p.profession_level?`<span style="white-space:nowrap;color:${inactive?'#aaa':color}">${prof==='Kriegsführer'?'⚔':'🔧'} Lv.${p.profession_level}</span>`:'',
    ].filter(Boolean).join('<span style="color:var(--bd2);margin:0 1px"> · </span>');
    return`<div class="mi" style="cursor:pointer;${inactive?'opacity:.42;background:#f9f9f9':''}" onclick="APP.selectedPlayer='${p.name.replace(/'/g,"\\'")}';renderPage()">
      <div class="mav" style="background:${inactive?'#eee':bg};color:${inactive?'#bbb':color};font-size:16px">${inactive?'✕':icon}</div>
      <div style="flex:1;min-width:0">
        <div class="mn" style="display:flex;align-items:center;gap:6px;${inactive?'color:var(--tx3);text-decoration:line-through':isK?'color:var(--ass)':''}">
          ${p.name}${pRole?rankBadge(pRole):''}
        </div>
        <div class="mm" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;align-items:center">
          ${inactive?'<span style="color:#e67e22;font-size:11px;font-weight:700">⚠ Ausgetreten</span>':stats||'<span style="color:var(--tx3)">Keine Daten</span>'}
        </div>
      </div>
      <div class="mr" style="flex-shrink:0">
        <span style="font-size:12px;font-weight:700;color:${inactive?'#ccc':relColor(rel)}">${inactive?'–':rel!==null?rel+'%':'Neu'}</span>
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:var(--tx3);stroke-width:2;fill:none"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>`;
  }

  const GROUP_META={R5:{label:'R5 · Präsident',c:'#f39c12'},R4:{label:'R4 · Offiziere',c:'#9b59b6'},R3:{label:'R3 · Mitglieder',c:'#7f8c8d'},inactive:{label:'Ausgetreten',c:'#bdc3c7'}};
  function groupHeader(role){const m=GROUP_META[role]||{label:role,c:'#8892a4'};return`<div style="padding:8px 14px 4px;font-size:11px;font-weight:800;color:${m.c};letter-spacing:.6px;background:${m.c}11;border-bottom:1px solid ${m.c}33">── ${m.label} ──</div>`;}

  let h=``;
  // Sort buttons
  h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
    ${SORTS.map(b=>`<button class="btn btn-sm ${s===b.k?'btn-sol':'btn-out'}" style="padding:5px 10px;font-size:12px" onclick="APP.playerSort='${b.k}';renderPage()">${b.l}</button>`).join('')}
  </div>`;
  // Summary
  h+=`<div class="note info" style="margin-bottom:10px;padding:8px 12px;font-size:12px">
    <strong>${active} aktive Spieler</strong> · ${pl.length-active} ausgetreten · ${pl.length} gesamt · Antippen für Profil
  </div>`;
  // Grouped player list
  let listHtml='';let lastGroup=null;
  sorted.forEach(p=>{
    const g=isInactive(p.name)?'inactive':(p.role||'R3');
    if(g!==lastGroup){listHtml+=groupHeader(g);lastGroup=g;}
    listHtml+=playerRow(p);
  });
  h+=`<div class="card">${listHtml}</div>`;
  return h;
}

function wsPlayerProfile(name){
  const p=APP.data.players.find(x=>x.name===name);
  if(!p)return`<div class="loader">Spieler nicht gefunden.</div>`;
  const allParts=APP.data.participation.filter(x=>x.player_name===name);
  const allEvts=allParts.map(x=>({...x,ev:APP.data.events.find(e=>e.id===x.event_id)})).filter(x=>x.ev).sort((a,b)=>b.ev.event_date.localeCompare(a.ev.event_date));
  const played=allParts.filter(x=>x.played);
  const missed=allParts.filter(x=>!x.played&&!x.excused);
  const excused=allParts.filter(x=>x.excused);
  const rel=allParts.length?Math.round(played.length/allParts.length*100):null;
  const ap=played.filter(x=>x.individual_pts).reduce((s,x)=>s+(x.individual_pts||0),0);
  const apCount=played.filter(x=>x.individual_pts).length;
  const avgP=apCount?Math.round(ap/apCount):0;
  const evtsWon=allEvts.filter(x=>x.played&&x.ev?.result==='win').length;
  const evtsLost=allEvts.filter(x=>x.played&&x.ev?.result==='loss').length;
  const bestRank=played.filter(x=>x.rank).reduce((m,x)=>x.rank<m?x.rank:m,999);

  const inactive=isInactive(name);
  const canEdit=canAccess('profile_edit');
  const safeName=name.replace(/'/g,"\\'");
  let h=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <button class="btn btn-out btn-sm" onclick="APP.selectedPlayer=null;renderPage()">← Alle Spieler</button>
    ${canEdit&&!inactive?`<button class="btn btn-sol btn-sm" onclick="APP.selectedPlayer=null;APP.allianzPlayer='${safeName}';APP.allianzPlayerEdit=true;APP.allianzParsed=null;APP.allianzParsedSel={};nav('allianz')">✏ Profil bearbeiten</button>`:''}
  </div>`;
  if(inactive)h+=`<div class="note" style="margin-bottom:10px;border-left-color:#e67e22;background:#fef9f0">⚠️ <strong>Nicht mehr in der Allianz</strong> — Historische Daten aus früheren WS-Läufen.</div>`;
  h+=`<div style="display:flex;align-items:center;gap:13px;margin-bottom:16px;${inactive?'opacity:.7':''}">
    <div style="width:52px;height:52px;border-radius:16px;background:${inactive?'#ccc':'var(--primary)'};display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0">${name.charAt(0)}</div>
    <div><div style="font-size:18px;font-weight:800;${inactive?'color:var(--tx3);text-decoration:line-through':''}">${name}</div>
    <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
      ${inactive?`<span style="font-size:11px;font-weight:700;color:#e67e22;background:#fef0e0;padding:3px 8px;border-radius:6px">Ausgetreten</span>`:''}
      ${p.team&&!inactive?badge('Team '+p.team,p.team==='A'?'var(--win)':'#2980b9'):''}
      ${rel!==null?`<span style="font-size:11px;font-weight:700;color:${relColor(rel)};background:${relColor(rel)}22;padding:3px 8px;border-radius:6px">${rel}% Quote</span>`:''}
    </div></div>
  </div>`;

  // Spieler-Info (Beruf, Kills, Beliebtheit)
  const profP=p.profession||'Ingenieur';const isKP=profP==='Kriegsführer';
  if(profP||p.kills||p.popularity||p.profession_level){
    h+=`<div class="card" style="margin-bottom:10px"><div class="ch">Spieler-Info</div><div style="padding:12px"><div class="kk-grid">
      <div class="kk-box" style="${isKP?'border:1.5px solid var(--ass);background:var(--ass-l)':''}"><div class="kk-l">Beruf</div><div class="kk-v" style="font-size:14px;color:${isKP?'var(--ass)':'var(--primary)'}">${isKP?'⚔ Kriegsführer':'🔧 Ingenieur'}</div></div>
      ${p.profession_level?`<div class="kk-box"><div class="kk-l">Beruf-Level</div><div class="kk-v">${p.profession_level}</div></div>`:''}
      ${p.kills?`<div class="kk-box"><div class="kk-l">Kills</div><div class="kk-v">${fmtK(p.kills)}</div></div>`:''}
      ${p.popularity?`<div class="kk-box"><div class="kk-l">❤ Beliebtheit</div><div class="kk-v">${fmt(p.popularity)}</div></div>`:''}
    </div></div></div>`;
  }
  // Strength box
  if(p.t1||p.t2||p.t3){
    h+=`<div class="card" style="margin-bottom:10px"><div class="ch">Truppenstärke</div><div style="padding:12px"><div class="kk-grid">
      ${p.t1?`<div class="kk-box"><div class="kk-l">T1</div><div class="kk-v">${p.t1} M</div></div>`:''}
      ${p.t2?`<div class="kk-box"><div class="kk-l">T2</div><div class="kk-v">${p.t2} M</div></div>`:''}
      ${p.t3?`<div class="kk-box"><div class="kk-l">T3</div><div class="kk-v">${p.t3} M</div></div>`:''}
      ${p.t4?`<div class="kk-box"><div class="kk-l">T4</div><div class="kk-v">${p.t4} M</div></div>`:''}
      ${p.total_power?`<div class="kk-box" style="grid-column:1/-1"><div class="kk-l">Gesamtkampfkraft</div><div class="kk-v" style="font-size:18px">${fmt(p.total_power)}</div></div>`:''}
    </div></div></div>`;
  }

  // WS stats
  if(allParts.length){

        </div>

      </div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="note">Noch keine WS-Teilnahme erfasst.</div>`;
  }
  return h;
}

let _resultChoice=null;
function setResult(r){
  _resultChoice=r;
  document.getElementById('res-win').style.background=r==='win'?'var(--win)':'';
  document.getElementById('res-win').style.color=r==='win'?'#fff':'';
  document.getElementById('res-loss').style.background=r==='loss'?'var(--loss)':'';
  document.getElementById('res-loss').style.color=r==='loss'?'#fff':'';}

function toggleMissed(safe){
  const btn=document.getElementById('excbtn-'+safe);
  const cb=document.getElementById('miss-'+safe);
  if(btn)btn.style.display=cb&&cb.checked?'':'none';
  if(!cb||!cb.checked){
    // unchecked → remove from excused
    if(!APP.excusedPlayers)APP.excusedPlayers=[];
    // find player name by safe id match and remove
    const lbl=document.getElementById('exc-'+safe);
    if(lbl)lbl.textContent='';
  }
}
function markExcused(name,safe){
  if(!APP.excusedPlayers)APP.excusedPlayers=[];
  if(APP.excusedPlayers.includes(name)){
    APP.excusedPlayers=APP.excusedPlayers.filter(n=>n!==name);
  }else{
    APP.excusedPlayers.push(name);
  }
  const on=APP.excusedPlayers.includes(name);
  const btn=document.getElementById('excbtn-'+safe);
  const lbl=document.getElementById('exc-'+safe);
  if(btn){btn.style.background=on?'var(--acc)':'';btn.style.color=on?'#fff':'';}
  if(lbl)lbl.textContent=on?'✓ entschuldigt':'';
}

async function saveResult(){
  const date=document.getElementById('ef-date')?.value;
  const opp=document.getElementById('ef-opp')?.value;
  const our=parseInt(document.getElementById('ef-our')?.value)||null;
  const oppPts=parseInt(document.getElementById('ef-opp-pts')?.value)||null;
  if(!date||!_resultChoice){alert('Bitte Datum und Ergebnis (Sieg/Niederlage) angeben.');return;}
  const btn=document.getElementById('saveRes');if(btn){btn.textContent='Speichern…';btn.disabled=true;}
  try{
    const evRes=await fetch(SB+'/rest/v1/ws_events',{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({event_date:date,team:APP.team,time_slot:APP.team==='A'?'13:00':'22:00',opponent:opp||null,our_pts:our,opp_pts:oppPts,result:_resultChoice})});
    if(!evRes.ok)throw new Error(await evRes.text());
    const [newEv]=await evRes.json();
    const eid=newEv.id;
    // Save participation for all players: missed = checked, played = unchecked
    const missed=new Set();
    APP.data.players.forEach(p=>{
      const safe=p.name.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
      const cb=document.getElementById('miss-'+safe);
      if(cb&&cb.checked)missed.add(p.name);
    });
    const excused=new Set(APP.excusedPlayers||[]);
    const mkRec=(p,withExc)=>{const r={event_id:eid,player_name:p.name,played:!missed.has(p.name)};if(withExc)r.excused=!missed.has(p.name)?false:excused.has(p.name);return r;};
    // Try inserting first batch with excused; if column missing, retry all without
    let batches=[];
    for(let i=0;i<APP.data.players.length;i+=20)batches.push(APP.data.players.slice(i,i+20));
    let hasExcusedCol=true;
    try{await sbPost('ws_participation',batches[0].map(p=>mkRec(p,true)));}
    catch(e){
      if(e.message&&e.message.includes('excused')){hasExcusedCol=false;await sbPost('ws_participation',batches[0].map(p=>mkRec(p,false)));}
      else throw e;
    }
    for(let i=1;i<batches.length;i++)await sbPost('ws_participation',batches[i].map(p=>mkRec(p,hasExcusedCol)));
    if(!hasExcusedCol)console.warn('excused column missing – SQL: ALTER TABLE ws_participation ADD COLUMN excused boolean DEFAULT false;');
    alert('✅ Ergebnis + Teilnahme gespeichert!');
    _resultChoice=null;APP.excusedPlayers=[];
    await loadData();
    APP.wsEventId=eid;
    setWSView('ergebnis');
  }catch(err){alert('Fehler: '+err.message);if(btn){btn.textContent='Ergebnis speichern';btn.disabled=false;}}
}

const ROLE_DOT_C={R5:'#f39c12',R4:'#9b59b6',R3:'#7f8c8d'};
function roleDot(r,inact){
  const c=inact?'#bdc3c7':(ROLE_DOT_C[r]||'#7f8c8d');
  return`<div style="width:30px;height:30px;border-radius:50%;background:${c};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff">${inact?'✕':(r||'R3')}</div>`;
}
function allianzSortPlayers(list){
  const s=APP.allianzSort;
  const f=APP.allianzFilter;
  // Filter by roles
  let filtered=[...list];
  if(f.roles&&f.roles.length)filtered=filtered.filter(p=>{
    if(isInactive(p.name))return f.roles.includes('inaktiv');
    return f.roles.includes(p.role||'R3');
  });
  // Filter by profession
  if(f.profession==='Kriegsführer')filtered=filtered.filter(p=>p.profession==='Kriegsführer');
  if(f.profession==='Ingenieur')filtered=filtered.filter(p=>!p.profession||p.profession==='Ingenieur');
  // Filter by min T1
  if(f.minT1>0)filtered=filtered.filter(p=>isInactive(p.name)||(parseFloat(p.t1)||0)>=f.minT1);
  // Search
  const q=(APP.allianzSearch||'').toLowerCase().trim();
  if(q)filtered=filtered.filter(p=>p.name.toLowerCase().includes(q));
  // Sort
  filtered.sort((a,b)=>{
    const ai=isInactive(a.name),bi=isInactive(b.name);
    if(ai!==bi)return ai?1:-1;
    if(s==='role'){const rr=roleRank(b.role)-roleRank(a.role);return rr!==0?rr:a.name.localeCompare(b.name);}
    if(s==='t1')return(parseFloat(b.t1)||0)-(parseFloat(a.t1)||0);
    if(s==='kills')return(b.kills||0)-(a.kills||0);
    if(s==='popularity')return(b.popularity||0)-(a.popularity||0);
    if(s==='profession_level')return(b.profession_level||0)-(a.profession_level||0);
    if(s==='profession')return(a.profession||'').localeCompare(b.profession||'');
    return a.name.localeCompare(b.name);
  });
  return filtered;
}

    const evtsWon=allEvts.filter(x=>x.played&&x.ev?.result==='win').length;

// ── ALLIANZ PLAYER DETAIL HELPERS ──
function parseTruppenText(txt){
  if(!txt||!txt.trim()){APP.allianzParsed=null;APP.allianzParsedSel={};renderPage();return;}
  const res={};
  const patterns=[['t1',/T1\s*[:=]\s*([\d.,]+)/i],['t2',/T2\s*[:=]\s*([\d.,]+)/i],['t3',/T3\s*[:=]\s*([\d.,]+)/i],['t4',/T4\s*[:=]\s*([\d.,]+)/i],['total_power',/(?:gesamt|total|ges\.?)\s*[:=]?\s*([\d.,]+)/i]];
  patterns.forEach(([k,re])=>{const m=txt.match(re);if(m){const v=parseFloat(m[1].replace(',','.'));if(!isNaN(v))res[k]=k==='total_power'?Math.round(v):v;}});
  APP.allianzParsed=Object.keys(res).length?res:null;
  // default all checked
  if(APP.allianzParsed)Object.keys(APP.allianzParsed).forEach(k=>{if(APP.allianzParsedSel[k]===undefined)APP.allianzParsedSel[k]=true;});
  renderPage();
}
async function savePlayerHistory(name, fields){
  // fields: object with any of {t1,t2,t3,t4,total_power}
  const hasTruppe=fields.t1||fields.t2||fields.t3||fields.t4||fields.total_power;
  if(!hasTruppe)return;
  const pl=APP.data.players.find(x=>x.name===name);
  const hist={
    player_name:name,
    t1:fields.t1??pl?.t1??null,
    t2:fields.t2??pl?.t2??null,
    t3:fields.t3??pl?.t3??null,
    t4:fields.t4??pl?.t4??null,
    total_power:fields.total_power??pl?.total_power??null,
  };
  try{
    await sbPost('ws_player_history',[{...hist,changed_by:APP.user?.playerName||APP.user?.username||'unknown'}]);
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),{t1_updated_at:new Date().toISOString()});
    // update local
    if(pl)pl.t1_updated_at=new Date().toISOString();
    if(!APP.playerHistory[name])APP.playerHistory[name]=[];
    APP.playerHistory[name].unshift({...hist,recorded_at:new Date().toISOString()});
  }catch(e){console.warn('History save failed:',e.message);}
}
async function applyParsedTruppen(name){
  const parsed=APP.allianzParsed;const sel=APP.allianzParsedSel;
  if(!parsed)return;
  const upd={};
  Object.entries(parsed).forEach(([k,v])=>{if(sel[k]!==false)upd[k]=v;});
  if(!Object.keys(upd).length){alert('Keine Felder ausgewählt.');return;}
  try{
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),upd);
    const pl=APP.data.players.find(x=>x.name===name);
    if(pl)Object.assign(pl,upd);
    await savePlayerHistory(name,upd);
    APP.allianzParsed=null;APP.allianzParsedSel={};APP.allianzPlayerEdit=false;
    renderPage();
  }catch(e){alert('Fehler: '+e.message);}
}
async function apdSaveManual(name){
  const v=k=>document.getElementById(k)?.value;
  const upd={};
  const t1=parseFloat(v('apd-t1'));if(!isNaN(t1)&&t1>0)upd.t1=t1;
  const t2=parseFloat(v('apd-t2'));if(!isNaN(t2)&&t2>0)upd.t2=t2;
  const t3=parseFloat(v('apd-t3'));if(!isNaN(t3)&&t3>0)upd.t3=t3;
  const t4=parseFloat(v('apd-t4'));if(!isNaN(t4)&&t4>0)upd.t4=t4;
  const gkk=parseInt(v('apd-gkk'));if(!isNaN(gkk)&&gkk>0)upd.total_power=gkk;
  const isCorrection=!!APP.historyEditId;
  if(!isCorrection){
    const pl_val=parseInt(v('apd-pl'));if(!isNaN(pl_val)&&pl_val>0)upd.profession_level=pl_val;
    const kills=parseInt(v('apd-kills'));if(!isNaN(kills)&&kills>0)upd.kills=kills;
    const pop=parseInt(v('apd-pop'));if(!isNaN(pop)&&pop>0)upd.popularity=pop;
  }
  if(!Object.keys(upd).length){alert('Keine Werte eingetragen.');return;}
  const btn=document.getElementById('apd-save');if(btn){btn.textContent='Speichern…';btn.disabled=true;}
  try{
    if(isCorrection){
      // PATCH the existing history row
      const histFields={t1:upd.t1??null,t2:upd.t2??null,t3:upd.t3??null,t4:upd.t4??null,total_power:upd.total_power??null};
      await sbPatch('ws_player_history','id=eq.'+encodeURIComponent(APP.historyEditId),histFields);
      // Also update ws_players with the corrected values
      await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),upd);
      // Update local cache
      const pl=APP.data.players.find(x=>x.name===name);
      if(pl)Object.assign(pl,upd);
      const entry=APP.playerHistory[name]?.find(e=>e.id===APP.historyEditId);
      if(entry)Object.assign(entry,histFields);
      APP.historyEditId=null;APP.historyEditPrefill={};
    } else {
      await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),upd);

      if(pl)Object.assign(pl,upd);

function t1StaleInfo(player){
  if(!player)return null;
  const upd=player.t1_updated_at;
  if(!upd)return{stale:true,label:'Nie aktualisiert',color:'var(--loss)'};
  const days=Math.floor((Date.now()-new Date(upd).getTime())/(1000*86400));
  if(days>21)return{stale:true,label:`Veraltet (vor ${days} Tagen)`,color:'var(--loss)'};
  if(days>10)return{stale:false,label:`Vor ${days} Tagen`,color:'var(--acc)'};
  return{stale:false,label:days===0?'Heute':days===1?'Gestern':`Vor ${days} Tagen`,color:'var(--win)'};
}
function renderHistoryChart(name){
  const hist=(APP.playerHistory[name]||[]).slice().reverse(); // oldest first
  if(hist.length<2)return`<div style="padding:14px;text-align:center;font-size:12px;color:var(--tx3)">Noch nicht genug Datenpunkte für einen Verlauf.</div>`;
  const fields=[{k:'t1',c:'#2980b9',l:'T1'},{k:'t2',c:'#27ae60',l:'T2'},{k:'t3',c:'#e8a020',l:'T3'},{k:'t4',c:'#9b59b6',l:'T4'}].filter(f=>hist.some(h=>h[f.k]));
  const allVals=hist.flatMap(h=>fields.map(f=>parseFloat(h[f.k])||0));
  const maxV=Math.max(...allVals,0.1);
  const W=320,H=120,PAD=6,BOTT=20;
  const xScale=(W-PAD*2)/(hist.length-1||1);
  const yScale=(H-PAD-BOTT)/maxV;
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">`;
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=PAD+(H-PAD-BOTT)*(1-i/4);
    const val=(maxV*i/4).toFixed(1);
    svg+=`<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="#e2e6f0" stroke-width="1"/>`;
    svg+=`<text x="${PAD}" y="${y-2}" font-size="8" fill="#8892a4">${val}M</text>`;
  }
  // Lines per field
  fields.forEach(f=>{
    const pts=hist.map((h,i)=>{
      const v=parseFloat(h[f.k])||0;
      const x=PAD+i*xScale;
      const y=H-BOTT-v*yScale;
      return`${x},${y}`;
    });
    svg+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${f.c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
    // Dots
    hist.forEach((h,i)=>{
      const v=parseFloat(h[f.k])||0;if(!v)return;
      svg+=`<circle cx="${PAD+i*xScale}" cy="${H-BOTT-v*yScale}" r="3" fill="${f.c}"/>`
      svg+=`<title>${f.l}: ${v}M · ${h.recorded_at?.slice(0,10)||''}</title>`;
    });
  });
  // X-axis labels (first + last + middle if ≥5 points)
  const labelIdx=[0,hist.length-1];
  if(hist.length>=5)labelIdx.push(Math.floor(hist.length/2));
  labelIdx.forEach(i=>{
    const d=hist[i]?.recorded_at?.slice(0,10)||'';
    svg+=`<text x="${PAD+i*xScale}" y="${H-3}" font-size="7" fill="#8892a4" text-anchor="middle">${d.slice(5)}</text>`;
  });
  svg+=`</svg>`;
  // Legend
  const legend=fields.map(f=>`<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px"><span style="width:12px;height:3px;background:${f.c};display:inline-block;border-radius:2px"></span>${f.l}</span>`).join('');
  return`<div style="padding:12px">${svg}<div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap">${legend}</div></div>`;
}

async function saveProfilePassword(){
  const u=APP.user;
  const isSA=u.role==='superadmin';
  const targetName=isSA?(document.getElementById('prof-pw-player')?.value||u.playerName):u.playerName;
  // Safety: non-admin can only change own password
  if(!isSA&&targetName!==u.playerName){alert('Nur dein eigenes Passwort kann geändert werden.');return;}
  const pw=(document.getElementById('prof-pw-new')?.value||'').trim();
  const pw2=(document.getElementById('prof-pw-confirm')?.value||'').trim();
  if(!pw){showPwResult('Bitte ein Passwort eingeben.',false);return;}
  if(pw.length<4){showPwResult('Passwort muss mindestens 4 Zeichen haben.',false);return;}
  if(pw!==pw2){showPwResult('Passwörter stimmen nicht überein.',false);return;}
  const btn=document.getElementById('prof-pw-btn');
  if(btn){btn.textContent='Speichern…';btn.disabled=true;}
  try{
    const hash=await sha256(pw);
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(targetName),{password_hash:hash});
    const pl=APP.data.players.find(p=>p.name===targetName);
    if(pl)pl.password_hash=hash;
    showPwResult('✅ Passwort für „'+targetName+'" gespeichert!',true);
    document.getElementById('prof-pw-new').value='';
    document.getElementById('prof-pw-confirm').value='';
  }catch(err){showPwResult('Fehler: '+err.message,false);}
  if(btn){btn.textContent='Passwort speichern';btn.disabled=false;}
}
function showPwResult(msg,ok){
  const el=document.getElementById('prof-pw-result');
  if(!el)return;
  el.style.display='block';
  el.style.background=ok?'var(--win-l)':'var(--loss-l)';
  el.style.color=ok?'var(--win)':'var(--loss)';
  el.style.border='1px solid '+(ok?'#a9dfbf':'#f5b7b1');
  el.textContent=msg;
  if(ok)setTimeout(()=>{el.style.display='none';},3000);
}

              <span style="position:absolute;cursor:pointer;inset:0;border-radius:11px;background:${p.ws_admin?'var(--ass)':'#ccc'};transition:.2s">
                <span style="position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;left:${p.ws_admin?'21':'3'}px;top:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></span>
              </span>
            </label>
          </div>
          <div style="text-align:center;width:80px">
            <label style="position:relative;display:inline-block;width:40px;height:22px">
              <input type="checkbox" ${p.profile_edit?'checked':''} onchange="adminSetPerm('${p.name.replace(/'/g,"\\'")}','profile_edit',this.checked)"
                style="opacity:0;width:0;height:0;position:absolute">
              <span style="position:absolute;cursor:pointer;inset:0;border-radius:11px;background:${p.profile_edit?'var(--primary)':'#ccc'};transition:.2s">
                <span style="position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;left:${p.profile_edit?'21':'3'}px;top:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)"></span>
              </span>
            </label>
          </div>
        </div>`;
      }).join(''):`<div style="padding:14px;text-align:center;font-size:12px;color:var(--tx3)">Keine R4/R5 Spieler vorhanden.</div>`}
    </div>
    <div style="padding:10px 14px;background:#f8f9fc;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3)">
      <strong>WS-Admin:</strong> Darf Aufstellungen und WS-Einstellungen ändern &nbsp;·&nbsp;
      <strong>Profil Edit:</strong> Darf eigene und fremde Spielerprofile bearbeiten
    </div>
  </div>

  <!-- DATEN EXPORT -->
  <div class="card" style="margin-bottom:12px">
    <div class="ch">Daten-Export <span class="ch-sub">Aktueller Stand aller Spieler</span></div>
    <div class="cb">
      <div class="note info" style="margin-bottom:12px">Exportiert alle Spielerprofile als Excel-Datei. Nur der aktuelle Stand — keine Verlaufshistorie.</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sol" style="flex:1" onclick="exportPlayersExcel()">
          <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;vertical-align:middle;margin-right:5px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Excel exportieren (.xlsx)
        </button>
      </div>
      <div id="export-info" style="display:none;margin-top:10px;font-size:12px;color:var(--win);font-weight:600"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px"><div class="ch">Allianzen</div>
    <div class="mi"><div class="mav" style="background:var(--win-l);color:var(--win)">P</div>
      <div><div class="mn">AR1S</div><div class="mm">Server #1668 · ${active.length} aktive Mitglieder</div></div>
      <div class="mr">${badge('Aktiv','var(--win)')}</div>
    </div>
  </div>`;}
function exportPlayersExcel(){
  if(typeof XLSX==='undefined'){alert('Excel-Bibliothek noch nicht geladen. Bitte kurz warten und nochmal versuchen.');return;}
  const all=APP.data.players;
  if(!all.length){alert('Keine Spielerdaten vorhanden.');return;}

  // Aktive Spieler zuerst, dann inaktive; innerhalb nach Rolle sortiert
  const sorted=[...all].sort((a,b)=>{
    const ia=isInactive(a.name),ib=isInactive(b.name);
    if(ia!==ib)return ia?1:-1;
    const rr=roleRank(b.role||'R3')-roleRank(a.role||'R3');
    return rr||a.name.localeCompare(b.name);
  });

  const rows=sorted.map(p=>({
    'Name':p.name,
    'Rolle':p.role||'R3',
    'Status':isInactive(p.name)?'Ausgetreten':'Aktiv',
    'Beruf':p.profession||'',
    'Beruf-Level':p.profession_level||'',
    'Kills':p.kills||'',
    'Beliebtheit':p.popularity||'',
    'T1 (Mio.)':p.t1||'',
    'T2 (Mio.)':p.t2||'',
    'T3 (Mio.)':p.t3||'',
    'T4 (Mio.)':p.t4||'',
    'Gesamtkampfkraft':p.total_power||'',
    'T1 zuletzt aktualisiert':p.t1_updated_at?p.t1_updated_at.slice(0,10):'',
  }));

  const ws=XLSX.utils.json_to_sheet(rows);

  // Auto column widths
  const colWidths=Object.keys(rows[0]).map(k=>({wch:Math.max(k.length,12)}));
  ws['!cols']=colWidths;

  // Style header row bold (basic)
  const range=XLSX.utils.decode_range(ws['!ref']);
  for(let C=range.s.c;C<=range.e.c;C++){
    const addr=XLSX.utils.encode_cell({r:0,c:C});
    if(!ws[addr])continue;
    ws[addr].s={font:{bold:true},fill:{fgColor:{rgb:'2C3E6B'}},};
  }

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Spielerprofile');

  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`warsync_spieler_${date}.xlsx`);

  const info=document.getElementById('export-info');
  if(info){info.style.display='block';info.textContent=`✓ ${rows.length} Spieler exportiert (${sorted.filter(p=>!isInactive(p.name)).length} aktiv, ${sorted.filter(p=>isInactive(p.name)).length} ausgetreten)`;}
}
async function adminSetPerm(name,field,val){
  try{
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),{[field]:val});
    const pl=APP.data.players.find(p=>p.name===name);
    if(pl)pl[field]=val;
    renderPage();
  }catch(e){alert('Fehler: '+e.message);}
}
async function adminSetAccess(name,val){
  try{
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),{access_enabled:val});
    const pl=APP.data.players.find(p=>p.name===name);
    if(pl)pl.access_enabled=val;
    renderPage();
  }catch(e){alert('Fehler: '+e.message);}
}
async function adminSetCanResetPw(name,val){
  try{
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),{can_reset_password:val});
    const pl=APP.data.players.find(p=>p.name===name);
    if(pl)pl.can_reset_password=val;
    renderPage();
  }catch(e){alert('Fehler: '+e.message);}
}
async function adminSetPassword(){
  const name=document.getElementById('pw-player')?.value;
  const pw=document.getElementById('pw-new')?.value?.trim();
  const res=document.getElementById('pw-result');
  const btn=document.getElementById('pw-save-btn');
  if(!name||!pw){if(res){res.style.display='block';res.style.background='#fdecea';res.style.color='var(--loss)';res.textContent='Bitte Spieler und Passwort eingeben.';}return;}
  if(pw.length<4){if(res){res.style.display='block';res.style.background='#fdecea';res.style.color='var(--loss)';res.textContent='Passwort muss mindestens 4 Zeichen haben.';}return;}
  if(btn){btn.textContent='Speichern…';btn.disabled=true;}
  try{
    const hash=await sha256(pw);
    await sbPatch('ws_players','name=eq.'+encodeURIComponent(name),{password_hash:hash,access_enabled:true});
    const pl=APP.data.players.find(p=>p.name===name);
    if(pl){pl.password_hash=hash;pl.access_enabled=true;}
    document.getElementById('pw-new').value='';
    if(res){res.style.display='block';res.style.background='#eafaf1';res.style.color='var(--win)';res.textContent=`✓ Passwort für „${name}" gesetzt. Zugang wurde automatisch aktiviert.`;}
    renderPage();
  }catch(e){if(res){res.style.display='block';res.style.background='#fdecea';res.style.color='var(--loss)';res.textContent='Fehler: '+e.message;}}
  finally{if(btn){btn.textContent='🔑 Passwort speichern';btn.disabled=false;}}
}

// ====== INIT ======
render();
</script>
